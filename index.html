// GENERADOR DE PROPUESTAS Y CONTRATOS (Documentos)
// ═══════════════════════════════════════════════════════════════
function generarDocumentos(leadId) {
  const l = (App.data.leads||[]).find(x=>x.id===leadId) || {};
  let html = "<!DOCTYPE html>\n<html lang=\"es\">\n<head>\n<meta charset=\"UTF-8\">\n<title>KBGB Recruiting — Generador de Propuestas y Contratos</title>\n<script src=\"https://cdn.tailwindcss.com\"><\/script>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link href=\"https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap\" rel=\"stylesheet\">\n<style>\n  :root{\n    --navy:#011b3e; --navy2:#022b61; --logobg:#0d3560;\n    --blue:#2791ef; --lightblue:#e7faff; --gray:#6b7280;\n  }\n  *{font-family:'Montserrat',sans-serif;}\n  body{background:#f3f4f6;}\n  .divider{height:3px;background:linear-gradient(90deg,#00d4ff,#2791ef,#1e50cc);}\n  .field-label{font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--navy2);text-transform:uppercase;}\n  .tab-btn.active{background:var(--navy);color:#fff;}\n  .doc-h1{font-weight:700;color:var(--navy);font-size:18px;margin-top:22px;margin-bottom:8px;}\n  .doc-label{font-weight:700;color:var(--navy2);font-size:11px;letter-spacing:.05em;text-transform:uppercase;}\n  .doc-body{font-size:13.5px;line-height:1.6;color:#1a1a1a;}\n  .ph{color:var(--blue);font-weight:700;font-style:italic;}\n  .sig-block{break-inside:avoid; page-break-inside:avoid;}\n  @page{ size:letter; margin:0.55in; }\n  @media print{\n    html, body{background:#fff; -webkit-print-color-adjust:exact; print-color-adjust:exact;}\n    .no-print{display:none !important;}\n    .preview-wrap{box-shadow:none !important; margin:0 !important; width:100% !important; max-width:none !important;}\n    .page{box-shadow:none !important; padding:0 !important; width:100% !important; min-height:0 !important;}\n    .doc-h1{margin-top:14px; margin-bottom:6px; break-after:avoid; page-break-after:avoid;}\n    .doc-body{margin-bottom:8px !important; line-height:1.45;}\n    p{orphans:3; widows:3;}\n  }\n</style>\n</head>\n<body class=\"min-h-screen\">\n\n<div class=\"no-print bg-[#011b3e] text-white px-6 py-4 flex items-center justify-between\">\n  <div class=\"flex items-center gap-3\">\n    <div class=\"bg-[#0d3560] px-3 py-2 rounded\">\n      <div class=\"font-black leading-none text-lg\">KBGB</div>\n      <div class=\"text-[9px] tracking-widest text-[#e7faff]\">RECRUITING</div>\n    </div>\n    <div class=\"text-sm text-gray-300\">Generador de Propuestas y Contratos</div>\n  </div>\n  <button onclick=\"window.print()\" class=\"bg-[#2791ef] hover:bg-[#1e78c9] text-white text-sm font-semibold px-4 py-2 rounded\">\n    Imprimir / Guardar PDF\n  </button>\n</div>\n\n<div class=\"no-print max-w-7xl mx-auto flex gap-6 px-6 py-6\">\n\n  <!-- SIDEBAR -->\n  <div class=\"w-80 shrink-0 bg-white rounded-lg shadow p-5 h-fit\">\n    <div class=\"flex gap-2 mb-3\">\n      <button id=\"tabProp\" onclick=\"setDoc('propuesta')\" class=\"tab-btn active flex-1 text-sm font-semibold py-2 rounded border border-[#011b3e]\">Propuesta</button>\n      <button id=\"tabCon\" onclick=\"setDoc('contrato')\" class=\"tab-btn flex-1 text-sm font-semibold py-2 rounded border border-[#011b3e]\">Contrato</button>\n    </div>\n    <div class=\"flex gap-2 mb-5\">\n      <button id=\"langEs\" onclick=\"setLang('es')\" class=\"tab-btn active flex-1 text-xs font-semibold py-1.5 rounded border border-[#011b3e]\">Español</button>\n      <button id=\"langEn\" onclick=\"setLang('en')\" class=\"tab-btn flex-1 text-xs font-semibold py-1.5 rounded border border-[#011b3e]\">English</button>\n    </div>\n\n    <div class=\"space-y-3\">\n      <div>\n        <label class=\"field-label\">Cliente / Empresa</label>\n        <input id=\"cliente\" oninput=\"render()\" class=\"w-full border rounded px-2 py-1.5 text-sm mt-1\" placeholder=\"Ej. Acme Inc.\" value=\"__CLIENTE__\">\n      </div>\n      <div>\n        <label class=\"field-label\">Cargo / Posición</label>\n        <input id=\"cargo\" oninput=\"render()\" class=\"w-full border rounded px-2 py-1.5 text-sm mt-1\" placeholder=\"Ej. Growth Marketer\" value=\"__CARGO__\">\n      </div>\n      <div class=\"grid grid-cols-2 gap-2\">\n        <div>\n          <label class=\"field-label\">Fee (% del 1er salario mensual)</label>\n          <input id=\"fee\" oninput=\"render()\" type=\"text\" class=\"w-full border rounded px-2 py-1.5 text-sm mt-1\" placeholder=\"Ej. 80\">\n        </div>\n        <div>\n          <label class=\"field-label\">Fee mínimo (USD)</label>\n          <input id=\"feeMinimo\" oninput=\"render()\" type=\"text\" class=\"w-full border rounded px-2 py-1.5 text-sm mt-1\" placeholder=\"Ej. 1000\">\n        </div>\n      </div>\n      <div>\n        <label class=\"field-label\">Días hábiles de pago (desde firma del candidato)</label>\n        <input id=\"diasPago\" oninput=\"render()\" type=\"text\" class=\"w-full border rounded px-2 py-1.5 text-sm mt-1\" placeholder=\"Ej. 5\">\n      </div>\n      <div>\n        <label class=\"field-label\">Fecha</label>\n        <input id=\"fecha\" oninput=\"render()\" type=\"text\" class=\"w-full border rounded px-2 py-1.5 text-sm mt-1\">\n      </div>\n      <div>\n        <label class=\"field-label\">Jurisdicción / Ley aplicable</label>\n        <input id=\"jurisdiccion\" oninput=\"render()\" class=\"w-full border rounded px-2 py-1.5 text-sm mt-1\" placeholder=\"Ej. Argentina\">\n        <p class=\"text-[11px] text-gray-400 mt-1 leading-snug\">Qué país/tribunales resuelven un conflicto. Si no estás seguro, usá el país donde está tu empresa, o dejalo vacío.</p>\n      </div>\n\n      <div id=\"contratoFields\" class=\"space-y-3 pt-2 border-t hidden\">\n        <div>\n          <label class=\"field-label\">Datos legales del cliente (opcional)</label>\n          <input id=\"clienteDetalle\" oninput=\"render()\" class=\"w-full border rounded px-2 py-1.5 text-sm mt-1\" placeholder=\"Ej. sociedad constituida en Delaware, domicilio en Miami, FL\">\n          <p class=\"text-[11px] text-gray-400 mt-1 leading-snug\">Solo si lo tenés a mano. Si lo dejás vacío, el contrato usa directamente el nombre de la empresa sin ese detalle.</p>\n        </div>\n        <div class=\"grid grid-cols-2 gap-2\">\n          <div>\n            <label class=\"field-label\">Días notif. conocim. previo</label>\n            <input id=\"diasNotifPrevia\" oninput=\"render()\" type=\"text\" class=\"w-full border rounded px-2 py-1.5 text-sm mt-1\" placeholder=\"2\">\n          </div>\n          <div>\n            <label class=\"field-label\">Meses vigencia candidato</label>\n            <input id=\"mesesPropiedad\" oninput=\"render()\" type=\"text\" class=\"w-full border rounded px-2 py-1.5 text-sm mt-1\" placeholder=\"12\">\n          </div>\n        </div>\n        <div>\n          <label class=\"field-label\">Días de preaviso terminación</label>\n          <input id=\"diasTerminacion\" oninput=\"render()\" type=\"text\" class=\"w-full border rounded px-2 py-1.5 text-sm mt-1\" placeholder=\"7\">\n        </div>\n        <div>\n          <label class=\"field-label\">Firma cliente — nombre</label>\n          <input id=\"firmanteNombre\" oninput=\"render()\" class=\"w-full border rounded px-2 py-1.5 text-sm mt-1\" placeholder=\"Nombre y apellido\">\n        </div>\n        <div>\n          <label class=\"field-label\">Firma cliente — cargo</label>\n          <input id=\"firmanteCargo\" oninput=\"render()\" class=\"w-full border rounded px-2 py-1.5 text-sm mt-1\" placeholder=\"Ej. CEO\">\n        </div>\n      </div>\n\n      <div class=\"pt-2 border-t\">\n        <label class=\"field-label\">Contacto (footer)</label>\n        <input id=\"email\" oninput=\"render()\" class=\"w-full border rounded px-2 py-1.5 text-sm mt-1\" placeholder=\"email\" value=\"__EMAIL__\">\n        <input id=\"telefono\" oninput=\"render()\" class=\"w-full border rounded px-2 py-1.5 text-sm mt-2\" placeholder=\"teléfono\" value=\"__TELEFONO__\">\n      </div>\n    </div>\n\n    <p class=\"text-[11px] text-gray-400 mt-4 leading-relaxed\">\n      Los campos se completan en la vista previa a la derecha. El contrato es un modelo de referencia — revisar con un profesional matriculado antes de firmar.\n    </p>\n  </div>\n\n  <!-- PREVIEW -->\n  <div class=\"flex-1 preview-wrap\">\n    <div class=\"page bg-white shadow-lg mx-auto\" style=\"width:816px; min-height:1056px; padding:56px 64px;\" id=\"preview\"></div>\n  </div>\n</div>\n\n<div class=\"hidden print:block preview-wrap\">\n  <div class=\"page\" style=\"width:100%; padding:0;\" id=\"previewPrint\"></div>\n</div>\n\n<script>\nlet currentDoc = 'propuesta';\nlet currentLang = 'es';\n\nfunction setDoc(d){\n  currentDoc = d;\n  document.getElementById('tabProp').classList.toggle('active', d==='propuesta');\n  document.getElementById('tabCon').classList.toggle('active', d==='contrato');\n  document.getElementById('contratoFields').classList.toggle('hidden', d!=='contrato');\n  render();\n}\n\nfunction setLang(l){\n  currentLang = l;\n  document.getElementById('langEs').classList.toggle('active', l==='es');\n  document.getElementById('langEn').classList.toggle('active', l==='en');\n  render();\n}\n\nfunction val(id, fallback){\n  const v = document.getElementById(id).value.trim();\n  return v ? v : fallback;\n}\n\nfunction header(title){\n  const fecha = val('fecha','[FECHA]');\n  return `\n  <div class=\"flex justify-between items-start\">\n    <div class=\"bg-[#0d3560] px-4 py-3 rounded\" style=\"min-width:130px;\">\n      <div class=\"text-white font-black text-xl leading-none\">KBGB</div>\n      <div class=\"text-[10px] tracking-widest text-[#e7faff] mt-1\">RECRUITING</div>\n    </div>\n    <div class=\"text-right\">\n      <div class=\"font-bold text-[#011b3e] text-lg\">${title}</div>\n      <div class=\"text-sm text-gray-500\">${fecha}</div>\n    </div>\n  </div>\n  <div class=\"divider my-5\"></div>`;\n}\n\nfunction footer(ref){\n  return `\n  <div class=\"mt-10 pt-3 border-t border-[#011b3e] flex justify-between text-xs text-gray-500\">\n    <div><span class=\"font-bold text-[#011b3e]\">KBGB</span> <span class=\"tracking-widest\">RECRUITING</span></div>\n    <div>${ref}</div>\n  </div>`;\n}\n\nfunction renderPropuesta(){\n  const cliente = val('cliente','[NOMBRE DEL CLIENTE / EMPRESA]');\n  const cargo = val('cargo','[CARGO]');\n  const fee = val('fee','[%FEE]');\n  const feeMinimo = val('feeMinimo','[MONTO MÍNIMO]');\n  const dias = val('diasPago','[X]');\n  const email = val('email','[email]');\n  const tel = val('telefono','[teléfono]');\n\n  return header('Propuesta de Servicio de Recruiting') + `\n    <p class=\"doc-body\"><b>Para:</b> ${cliente}</p>\n    <p class=\"doc-body mb-4\"><b>De:</b> Agustín González Benegas — KBGB Recruiting</p>\n\n    <div class=\"doc-h1\">Quiénes somos</div>\n    <p class=\"doc-body\">KBGB Recruiting es una consultora boutique de recruiting especializada en dos verticales: Growth &amp; Performance Marketing (marcas eCommerce/DTC y agencias) y Tech &amp; AI (empresas SaaS y de inteligencia artificial). Más de 10 años de experiencia en procesos de selección end-to-end para startups y empresas consolidadas a nivel global.</p>\n\n    <div class=\"doc-h1\">Modelo de servicio</div>\n    <ul class=\"doc-body list-disc pl-5 space-y-1\">\n      <li><b>Risk-free:</b> no se cobra honorario alguno si no se concreta la contratación.</li>\n      <li><b>Non-exclusive:</b> pueden abrir la búsqueda en paralelo con otros proveedores o su equipo interno.</li>\n      <li><b>Guaranteed:</b> si el candidato se desvincula dentro de los primeros 60 días, lo reemplazamos sin costo adicional.</li>\n    </ul>\n\n    <div class=\"doc-h1\">Rol a cubrir</div>\n    <p class=\"doc-body\">${cargo}</p>\n\n    <div class=\"doc-h1\">Honorarios</div>\n    <p class=\"doc-body\">Fee: <span class=\"ph\">${fee}%</span> del primer salario mensual del candidato contratado, con un honorario mínimo de US$<span class=\"ph\">${feeMinimo}</span>.</p>\n    <p class=\"doc-body\">Forma de pago: 100% al momento en que el candidato firma su vínculo laboral con ustedes, dentro de los <span class=\"ph\">${dias}</span> días hábiles.</p>\n\n    <div class=\"doc-h1\">Próximos pasos</div>\n    <ol class=\"doc-body list-decimal pl-5 space-y-1\">\n      <li>Confirmar el brief del rol (JD, banda salarial, criterios de filtro).</li>\n      <li>Firma del contrato de servicio.</li>\n      <li>Kickoff de la búsqueda.</li>\n    </ol>\n\n    <p class=\"doc-body mt-4\">Contacto: Agustín González Benegas · ${email} · ${tel} · kbgbrecruiting.github.io</p>\n  ` + footer('Propuesta comercial');\n}\n\nfunction renderContrato(){\n  const cliente = val('cliente','[NOMBRE DEL CLIENTE]');\n  const fecha = val('fecha','[FECHA DE VIGENCIA]');\n  const clienteDetalle = document.getElementById('clienteDetalle').value.trim();\n  const fee = val('fee','[%FEE]');\n  const feeMinimo = val('feeMinimo','[MONTO MÍNIMO]');\n  const diasPago = val('diasPago','[X]');\n  const diasNotifPrevia = val('diasNotifPrevia','2');\n  const mesesPropiedad = val('mesesPropiedad','12');\n  const diasTerminacion = val('diasTerminacion','7');\n  const jurisdiccion = val('jurisdiccion','el Estado de Florida, Estados Unidos');\n  const firmNombre = val('firmanteNombre','[Nombre]');\n  const firmCargo = val('firmanteCargo','[Cargo]');\n  const clienteLine = clienteDetalle\n    ? `KBGB Recruiting; y <span class=\"ph\">${cliente}</span>, ${clienteDetalle} (el \"Cliente\").`\n    : `KBGB Recruiting; y <span class=\"ph\">${cliente}</span> (el \"Cliente\").`;\n\n  return header('Contrato de Servicios de Reclutamiento') + `\n    <div class=\"no-print bg-gray-100 text-gray-500 text-xs italic p-3 rounded mb-4\">\n      Recordatorio interno (no se imprime): este es un modelo de referencia. Revisalo con un profesional matriculado antes de usarlo con un cliente real.\n    </div>\n\n    <p class=\"doc-body\">Este Contrato de Servicios de Reclutamiento (el \"Contrato\") se celebra con fecha <span class=\"ph\">${fecha}</span> (\"Fecha de Vigencia\") entre:</p>\n    <p class=\"doc-body\">${clienteLine}</p>\n    <p class=\"doc-body\">La Compañía y el Cliente son cada uno una \"Parte\" y en conjunto las \"Partes\". A los efectos de este Contrato, \"Afiliada\" significa cualquier entidad que controle, sea controlada por, o esté bajo control común con una Parte. En consideración de los compromisos mutuos aquí establecidos, las Partes acuerdan lo siguiente:</p>\n\n    <div class=\"doc-h1\">1. Contratación de Servicios</div>\n    <p class=\"doc-body\"><b>1.1 Alcance.</b> El Cliente contrata a la Compañía, de forma no exclusiva y totalmente contingente, para identificar, reclutar, evaluar y presentar candidatos (\"Candidatos\") para el/los puesto(s) descritos por el Cliente (cada uno, una \"Búsqueda\"). La Compañía acepta la contratación y realizará esfuerzos comercialmente razonables para llevar a cabo cada Búsqueda a través de su equipo interno de reclutamiento.</p>\n    <p class=\"doc-body\"><b>1.2 Sin honorarios anticipados.</b> Las Partes acuerdan que no hay honorarios anticipados. La contratación es enteramente basada en resultados: el Cliente solo pagará a la Compañía si contrata a un Candidato presentado por ella.</p>\n    <p class=\"doc-body\"><b>1.3 Job Description requerida.</b> Antes de iniciar cualquier Búsqueda, el Cliente deberá proporcionar una Job Description por escrito con responsabilidades, calificaciones requeridas, rango de compensación, línea de reporte, expectativas del puesto y demás detalles relevantes. La obligación de la Compañía comienza únicamente al recibir la Job Description.</p>\n    <p class=\"doc-body\"><b>1.4 Evaluación y presentación de candidatos.</b> La Compañía reclutará Candidatos que coincidan con los requisitos del Cliente utilizando su equipo interno, los entrevistará y evaluará, y presentará al Cliente los que considere adecuados. Las entrevistas finales, la debida diligencia, la verificación de referencias, los controles de antecedentes y las decisiones de contratación son responsabilidad exclusiva del Cliente.</p>\n\n    <div class=\"doc-h1\">2. Honorario de Colocación</div>\n    <p class=\"doc-body\"><b>2.1 Monto del honorario.</b> Por cada Candidato contratado por el Cliente (o cualquier afiliada del Cliente) como resultado de la presentación de la Compañía, el Cliente pagará un honorario de colocación equivalente al <span class=\"ph\">${fee}%</span> del primer salario mensual del Candidato. Existirá un honorario mínimo de US$<span class=\"ph\">${feeMinimo}</span> por contratación. Si el puesto es de tipo performance o basado en comisiones, se utilizará el OTE (on target earnings) presentado al candidato durante el proceso como base de la compensación.</p>\n    <p class=\"doc-body\"><b>2.2 Momento de pago.</b> El honorario se torna exigible inmediatamente al firmar el Candidato un contrato de trabajo u otro compromiso vinculante con el Cliente (\"Fecha de Firma\"). El pago total deberá remitirse dentro de los <span class=\"ph\">${diasPago}</span> días hábiles posteriores a la Fecha de Firma.</p>\n    <p class=\"doc-body\"><b>2.3 Sin contratación, sin honorario.</b> Si el Cliente no contrata a ningún Candidato presentado por la Compañía, no se adeudará honorario alguno.</p>\n    <p class=\"doc-body\"><b>2.4 Forma de pago.</b> El pago se realizará por transferencia bancaria o ACH a la cuenta designada por la Compañía.</p>\n\n    <div class=\"doc-h1\">3. Titularidad del Candidato</div>\n    <p class=\"doc-body\"><b>3.1 Conocimiento previo.</b> Si el Cliente mantuvo conversaciones sustantivas con un Candidato dentro de los doce (12) meses previos a la presentación de la Compañía, deberá notificarlo por escrito dentro de los <span class=\"ph\">${diasNotifPrevia}</span> días hábiles. De lo contrario, se considerará que el Candidato fue presentado por la Compañía.</p>\n    <p class=\"doc-body\"><b>3.2 Ventana de titularidad.</b> La Compañía tendrá derecho al honorario si un Candidato presentado por ella es contratado dentro de los <span class=\"ph\">${mesesPropiedad}</span> meses posteriores a su última presentación.</p>\n    <p class=\"doc-body\"><b>3.3 Referencias a terceros.</b> Si el Cliente refiere a un Candidato presentado por la Compañía a un tercero, y ese tercero lo contrata dentro de los <span class=\"ph\">${mesesPropiedad}</span> meses, el Cliente será responsable del honorario.</p>\n\n    <div class=\"doc-h1\">4. Responsabilidades del Cliente</div>\n    <p class=\"doc-body\">El Cliente se compromete a: brindar feedback oportuno; coordinar entrevistas con rapidez; notificar a la Compañía de inmediato ante cualquier oferta realizada o aceptada; garantizar el cumplimiento de la normativa laboral aplicable; y realizar los controles de antecedentes y debida diligencia que correspondan.</p>\n\n    <div class=\"doc-h1\">5. Confidencialidad</div>\n    <p class=\"doc-body\">Ambas Partes mantendrán confidencial toda información no pública compartida bajo este Contrato, incluida la de los Candidatos, y la usarán exclusivamente con fines de reclutamiento.</p>\n\n    <div class=\"doc-h1\">6. Vigencia y Terminación</div>\n    <p class=\"doc-body\">Cualquiera de las Partes podrá rescindir este Contrato en cualquier momento con <span class=\"ph\">${diasTerminacion}</span> días de preaviso por escrito. La terminación no afecta la obligación de pagar honorarios de Candidatos presentados antes de la terminación. Las notificaciones bajo este Contrato podrán realizarse por correo electrónico a los contactos designados por las Partes, y se considerarán recibidas al momento del envío, salvo prueba en contrario.</p>\n\n    <div class=\"doc-h1\">7. Limitación de Responsabilidad</div>\n    <p class=\"doc-body\">Ninguna de las Partes será responsable por daños indirectos, incidentales o consecuentes. La responsabilidad total de la Compañía no excederá el total de honorarios abonados en los doce (12) meses previos al reclamo.</p>\n\n    <div class=\"doc-h1\">8. Contratista Independiente</div>\n    <p class=\"doc-body\">La Compañía actúa como contratista independiente. Nada de lo aquí establecido crea una sociedad, joint venture o relación laboral entre las Partes.</p>\n\n    <div class=\"doc-h1\">9. Ley Aplicable</div>\n    <p class=\"doc-body\">Este Contrato se regirá por las leyes de <span class=\"ph\">${jurisdiccion}</span>. Cualquier disputa se resolverá exclusivamente en los tribunales de esa jurisdicción.</p>\n\n    <div class=\"doc-h1\">10. Acuerdo Integral</div>\n    <p class=\"doc-body\">Este Contrato constituye el entendimiento íntegro entre las Partes y reemplaza todo acuerdo previo. Las modificaciones deberán hacerse por escrito y ser firmadas por ambas Partes.</p>\n\n    <div class=\"doc-h1\">Firmas</div>\n    <div class=\"sig-block\">\n      <p class=\"doc-body\"><b>La Compañía</b></p>\n      <p class=\"doc-body\">Firma: _______________________________</p>\n      <p class=\"doc-body text-gray-500\">Nombre: Agustín González Benegas — Cargo: Founder/CEO</p>\n      <p class=\"doc-body\">Fecha: _______________________________</p>\n      <p class=\"doc-body mt-4\"><b>El Cliente</b></p>\n      <p class=\"doc-body\">Firma: _______________________________</p>\n      <p class=\"doc-body text-gray-500\">Nombre: ${firmNombre} — Cargo: ${firmCargo}</p>\n      <p class=\"doc-body\">Fecha: _______________________________</p>\n    </div>\n  ` + footer('Contrato de servicio');\n}\n\nfunction renderPropuestaEn(){\n  const cliente = val('cliente','[CLIENT NAME / COMPANY]');\n  const cargo = val('cargo','[POSITION]');\n  const fee = val('fee','[%FEE]');\n  const feeMinimo = val('feeMinimo','[MINIMUM FEE]');\n  const dias = val('diasPago','[X]');\n  const email = val('email','[email]');\n  const tel = val('telefono','[phone]');\n\n  return header('Recruiting Services Proposal') + `\n    <p class=\"doc-body\"><b>To:</b> ${cliente}</p>\n    <p class=\"doc-body mb-4\"><b>From:</b> Agustín González Benegas — KBGB Recruiting</p>\n\n    <div class=\"doc-h1\">Who we are</div>\n    <p class=\"doc-body\">KBGB Recruiting is a boutique recruiting consultancy focused on two verticals: Growth &amp; Performance Marketing (eCommerce/DTC brands and agencies) and Tech &amp; AI (SaaS and AI companies). Over 10 years of experience running end-to-end hiring processes for startups and established companies worldwide.</p>\n\n    <div class=\"doc-h1\">Service model</div>\n    <ul class=\"doc-body list-disc pl-5 space-y-1\">\n      <li><b>Risk-free:</b> no fee is charged unless the candidate is hired.</li>\n      <li><b>Non-exclusive:</b> you can run the search in parallel with other providers or your internal team.</li>\n      <li><b>Guaranteed:</b> if the hired candidate leaves within the first 60 days, we replace them at no additional cost.</li>\n    </ul>\n\n    <div class=\"doc-h1\">Role to fill</div>\n    <p class=\"doc-body\">${cargo}</p>\n\n    <div class=\"doc-h1\">Fees</div>\n    <p class=\"doc-body\">Fee: <span class=\"ph\">${fee}%</span> of the hired candidate's first monthly salary, with a minimum fee of US$<span class=\"ph\">${feeMinimo}</span>.</p>\n    <p class=\"doc-body\">Payment terms: 100% due once the candidate signs their employment agreement with you, within <span class=\"ph\">${dias}</span> business days.</p>\n\n    <div class=\"doc-h1\">Next steps</div>\n    <ol class=\"doc-body list-decimal pl-5 space-y-1\">\n      <li>Confirm the role brief (job description, salary range, screening criteria).</li>\n      <li>Sign the service agreement.</li>\n      <li>Kick off the search.</li>\n    </ol>\n\n    <p class=\"doc-body mt-4\">Contact: Agustín González Benegas · ${email} · ${tel} · kbgbrecruiting.github.io</p>\n  ` + footer('Commercial proposal');\n}\n\nfunction renderContratoEn(){\n  const cliente = val('cliente','[CLIENT NAME]');\n  const fecha = val('fecha','[EFFECTIVE DATE]');\n  const clienteDetalle = document.getElementById('clienteDetalle').value.trim();\n  const fee = val('fee','[%FEE]');\n  const feeMinimo = val('feeMinimo','[MINIMUM FEE]');\n  const diasPago = val('diasPago','[X]');\n  const diasNotifPrevia = val('diasNotifPrevia','2');\n  const mesesPropiedad = val('mesesPropiedad','12');\n  const diasTerminacion = val('diasTerminacion','7');\n  const jurisdiccion = val('jurisdiccion','the State of Florida, United States');\n  const firmNombre = val('firmanteNombre','[Name]');\n  const firmCargo = val('firmanteCargo','[Title]');\n  const clienteLine = clienteDetalle\n    ? `KBGB Recruiting; and <span class=\"ph\">${cliente}</span>, ${clienteDetalle} (the \"Client\").`\n    : `KBGB Recruiting; and <span class=\"ph\">${cliente}</span> (the \"Client\").`;\n\n  return header('Recruitment Services Agreement') + `\n    <div class=\"no-print bg-gray-100 text-gray-500 text-xs italic p-3 rounded mb-4\">\n      Internal reminder (not printed): this is a reference template. Have it reviewed by a licensed attorney before using it with a real client.\n    </div>\n\n    <p class=\"doc-body\">This Recruitment Services Agreement (the \"Agreement\") is made and entered into as of <span class=\"ph\">${fecha}</span> (\"Effective Date\") by and between:</p>\n    <p class=\"doc-body\">${clienteLine}</p>\n    <p class=\"doc-body\">The Company and the Client are each a \"Party\" and together the \"Parties.\" For purposes of this Agreement, \"Affiliate\" means any entity that directly or indirectly controls, is controlled by, or is under common control with a Party. In consideration of the mutual covenants set forth below, the Parties agree as follows:</p>\n\n    <div class=\"doc-h1\">1. Engagement of Services</div>\n    <p class=\"doc-body\"><b>1.1 Scope.</b> The Client hereby engages the Company, on a non-exclusive and fully contingent basis, to identify, headhunt, evaluate, and introduce candidates (\"Candidates\") for employment in the position(s) described by the Client (each a \"Search\"). The Company accepts the engagement and shall use commercially reasonable efforts to conduct each Search through its internal recruiting team.</p>\n    <p class=\"doc-body\"><b>1.2 No Upfront Fees.</b> The Parties agree that there are no upfront fees. The engagement is entirely performance-based. The Client shall only pay the Company if the Client hires a Candidate introduced by the Company.</p>\n    <p class=\"doc-body\"><b>1.3 Job Description Required.</b> Prior to the commencement of any Search, the Client shall provide a written Job Description including responsibilities, required qualifications, compensation range, reporting line, work expectations, and other relevant details. The Company's obligation to perform a Search begins only upon receipt of the Job Description.</p>\n    <p class=\"doc-body\"><b>1.4 Candidate Screening &amp; Presentation.</b> The Company will headhunt Candidates matching the Client's requirements using its internal recruiting team, interview and vet them, and present suitable Candidates to the Client. Final interviews, due diligence, reference checks, background checks, and hiring decisions remain the sole responsibility of the Client.</p>\n\n    <div class=\"doc-h1\">2. Placement Fee</div>\n    <p class=\"doc-body\"><b>2.1 Fee Amount.</b> For each Candidate hired by the Client (or any Affiliate of the Client) as a result of the Company's introduction, the Client shall pay the Company a placement fee equal to <span class=\"ph\">${fee}%</span> of the Candidate's first-monthly salary. There shall be a minimum fee of US$<span class=\"ph\">${feeMinimo}</span> per hire. If the role is a performance or commission based role, the OTE (on target earnings) presented to the candidate in the hiring process will be used as the compensation base.</p>\n    <p class=\"doc-body\"><b>2.2 Trigger &amp; Due Date.</b> The Placement Fee becomes due immediately upon the Candidate signing an employment agreement or other binding engagement with the Client (\"Signature Date\"). Full payment shall be remitted within <span class=\"ph\">${diasPago}</span> business days of the Signature Date.</p>\n    <p class=\"doc-body\"><b>2.3 No Hire, No Fee.</b> If the Client does not hire any Candidate introduced by the Company, no fee shall be owed.</p>\n    <p class=\"doc-body\"><b>2.4 Payment Method.</b> Payment shall be made via wire transfer or ACH to the Company's designated account.</p>\n\n    <div class=\"doc-h1\">3. Candidate Ownership</div>\n    <p class=\"doc-body\"><b>3.1 Prior Knowledge.</b> If the Client has had substantive discussions with a Candidate within twelve (12) months prior to the Company's introduction, the Client must notify the Company in writing within <span class=\"ph\">${diasNotifPrevia}</span> business days. Otherwise, the Candidate shall be deemed introduced by the Company.</p>\n    <p class=\"doc-body\"><b>3.2 Ownership Window.</b> The Company shall be entitled to the Placement Fee if a Candidate introduced by the Company is hired within <span class=\"ph\">${mesesPropiedad}</span> months of the most recent submission of that Candidate.</p>\n    <p class=\"doc-body\"><b>3.3 Third-Party Referrals.</b> If the Client refers a Candidate introduced by the Company to a third party and that third party hires the Candidate within <span class=\"ph\">${mesesPropiedad}</span> months, the Client shall be responsible for the Placement Fee.</p>\n\n    <div class=\"doc-h1\">4. Client Responsibilities</div>\n    <p class=\"doc-body\">The Client agrees to: provide timely feedback; schedule interviews promptly; notify the Company immediately of any offer made or accepted; ensure compliance with all employment laws; and conduct any required background checks and due diligence.</p>\n\n    <div class=\"doc-h1\">5. Confidentiality</div>\n    <p class=\"doc-body\">Both Parties agree to keep confidential all non-public information shared under this Agreement, including Candidate information, and use it solely for recruitment purposes.</p>\n\n    <div class=\"doc-h1\">6. Term &amp; Termination</div>\n    <p class=\"doc-body\">Either Party may terminate this Agreement at any time upon <span class=\"ph\">${diasTerminacion}</span> days' written notice. Termination does not affect the Client's obligation to pay any Placement Fees for Candidates introduced prior to termination. Notices under this Agreement may be delivered by email to the Parties' designated contacts and will be deemed received upon sending, absent evidence to the contrary.</p>\n\n    <div class=\"doc-h1\">7. Limitation of Liability</div>\n    <p class=\"doc-body\">In no event shall either Party be liable for indirect, incidental, or consequential damages. The Company's total liability shall not exceed the total Placement Fees paid in the twelve (12) months preceding the claim.</p>\n\n    <div class=\"doc-h1\">8. Independent Contractor</div>\n    <p class=\"doc-body\">The Company acts as an independent contractor. Nothing herein creates a partnership, joint venture, or employment relationship between the Parties.</p>\n\n    <div class=\"doc-h1\">9. Governing Law</div>\n    <p class=\"doc-body\">This Agreement shall be governed by the laws of <span class=\"ph\">${jurisdiccion}</span>. Any disputes shall be resolved exclusively in the courts of that jurisdiction.</p>\n\n    <div class=\"doc-h1\">10. Entire Agreement</div>\n    <p class=\"doc-body\">This Agreement constitutes the entire understanding between the Parties and supersedes all prior agreements. Amendments must be in writing and signed by both Parties.</p>\n\n    <div class=\"doc-h1\">Signatures</div>\n    <div class=\"sig-block\">\n      <p class=\"doc-body\"><b>The Company</b></p>\n      <p class=\"doc-body\">Signature: _______________________________</p>\n      <p class=\"doc-body text-gray-500\">Name: Agustín González Benegas — Title: Founder/CEO</p>\n      <p class=\"doc-body\">Date: _______________________________</p>\n      <p class=\"doc-body mt-4\"><b>The Client</b></p>\n      <p class=\"doc-body\">Signature: _______________________________</p>\n      <p class=\"doc-body text-gray-500\">Name: ${firmNombre} — Title: ${firmCargo}</p>\n      <p class=\"doc-body\">Date: _______________________________</p>\n    </div>\n  ` + footer('Service agreement');\n}\n\nfunction render(){\n  let html;\n  if(currentLang === 'es'){\n    html = currentDoc === 'propuesta' ? renderPropuesta() : renderContrato();\n  } else {\n    html = currentDoc === 'propuesta' ? renderPropuestaEn() : renderContratoEn();\n  }\n  document.getElementById('preview').innerHTML = html;\n  document.getElementById('previewPrint').innerHTML = html;\n}\n\ndocument.getElementById('fecha').value = new Date().toLocaleDateString('es-AR', { day:'2-digit', month:'long', year:'numeric' });\nrender();\n<\/script>\n</body>\n</html>\n";
  html = html
    .replace('__CLIENTE__', escAttr(l.empresa||''))
    .replace('__CARGO__', escAttr(l.puesto||''))
    .replace('__EMAIL__', escAttr(l.contacto_email||''))
    .replace('__TELEFONO__', escAttr(l.contacto_telefono||l.contacto_whatsapp||''));
  const win = window.open('','_blank');
  win.document.write(html);
  win.document.close();
}

// CHAT DE RECALIBRACIÓN DE SCORE
// ═══════════════════════════════════════════════════════════════
const _scoreChatState = {}; // { [candidatoId]: { history: [], mic: null } }

function toggleScoreChat(id) {
  const el = document.getElementById('scoreChat_'+id);
  if(!el) return;
  el.classList.toggle('hidden');
  if(!el.classList.contains('hidden') && !_scoreChatState[id]) {
    _scoreChatState[id] = { history: [], mic: null };
  }
}

function appendScoreChatMsg(id, role, texto) {
  const hist = document.getElementById('scoreChatHistory_'+id);
  if(!hist) return;
  const div = document.createElement('div');
  div.className = role==='user'
    ? 'text-xs bg-gray-100 rounded-lg px-3 py-2 text-gray-700 self-end ml-8'
    : 'text-xs bg-indigo-50 border border-indigo-100 rounded-lg px-3 py-2 text-indigo-900 mr-8';
  div.textContent = texto;
  hist.appendChild(div);
  hist.scrollTop = hist.scrollHeight;
}

async function enviarMensajeScore(id) {
  const input = document.getElementById('scoreChatInput_'+id);
  if(!input) return;
  const texto = input.value.trim();
  if(!texto) return;
  input.value = '';

  if(!_scoreChatState[id]) _scoreChatState[id]={history:[],mic:null};
  const state = _scoreChatState[id];

  appendScoreChatMsg(id,'user',texto);
  state.history.push({role:'user',content:texto});

  // Mostrar "escribiendo..."
  const hist = document.getElementById('scoreChatHistory_'+id);
  const typing = document.createElement('div');
  typing.id = 'scoreTyping_'+id;
  typing.className = 'text-xs text-gray-400 italic px-1';
  typing.textContent = 'La IA está analizando...';
  if(hist) hist.appendChild(typing);

  let respuesta = '';
  try {
    const c = App.data.candidatos.find(x=>x.id===id)||{};
    const b = App.data.busquedas.find(x=>x.id===c.busqueda_id)||{};

    const r = await apiPost({action:'recalibrar_score', data:{
      candidato_id: id,
      nombre: c.nombre||'',
      puesto: b.puesto||'', cliente: b.cliente||'', seniority: b.seniority||'',
      must_haves: b.must_haves||'', criterio_si: b.criterio_si||'',
      cv_score: c.cv_score||'', cv_score_pros: c.cv_score_pros||'', cv_score_contras: c.cv_score_contras||'',
      resumen_ejecutivo: c.resumen_ejecutivo||'', notas: c.notas||'',
      history: state.history
    }});

    // Quitar "escribiendo..."
    document.getElementById('scoreTyping_'+id)?.remove();

    if(!r || r.status!=='ok') {
      appendScoreChatMsg(id,'ia','Error: '+(r?.message||'algo salió mal'));
      return;
    }

    const d = r.data||{};
    respuesta = d.respuesta || 'Listo.';
    appendScoreChatMsg(id,'ia', respuesta);
    state.history.push({role:'assistant', content:respuesta});

    // Actualizar score si la IA devolvió uno nuevo (puede ser 0, verificar con != null)
    if(d.nuevo_score !== null && d.nuevo_score !== undefined) {
      c.cv_score = d.nuevo_score;
      if(d.nuevos_pros) c.cv_score_pros = JSON.stringify(d.nuevos_pros);
      if(d.nuevos_contras) c.cv_score_contras = JSON.stringify(d.nuevos_contras);

      // Actualizar bloque visual
      const ns = normScore(d.nuevo_score);
      const color = ns>=7?'bg-green-50 border-green-200':ns>=5?'bg-yellow-50 border-yellow-200':'bg-red-50 border-red-200';
      const tcol  = ns>=7?'text-green-800':ns>=5?'text-yellow-800':'text-red-800';
      const vcol  = ns>=7?'text-green-600':ns>=5?'text-yellow-600':'text-red-500';
      const scoreBlock = document.getElementById('scoreBlock_'+id);
      if(scoreBlock) {
        scoreBlock.className = `rounded-xl border p-4 mb-4 ${color}`;
        const numEl = scoreBlock.querySelector('.text-2xl');
        if(numEl){numEl.textContent=ns; numEl.className=`text-2xl font-black ${vcol}`;}
        const lblEl = scoreBlock.querySelector('[data-score-label]');
        if(lblEl){lblEl.textContent=`Score IA: ${ns}/10`; lblEl.className=`text-xs font-bold uppercase tracking-wide ${tcol}`;}
        const pc = document.getElementById('scoreProsContras_'+id);
        if(pc) {
          const prosHtml = c.cv_score_pros?`<div><p class="text-xs font-semibold text-green-700 mb-1">✓ A favor</p><ul class="space-y-0.5">${toArr(c.cv_score_pros).map(p=>`<li class="text-xs text-gray-600">• ${p}</li>`).join('')}</ul></div>`:'';
          const contrasHtml = c.cv_score_contras?`<div><p class="text-xs font-semibold text-red-600 mb-1">✗ En contra</p><ul class="space-y-0.5">${toArr(c.cv_score_contras).map(p=>`<li class="text-xs text-gray-600">• ${p}</li>`).join('')}</ul></div>`:'';
          pc.innerHTML = prosHtml+contrasHtml;
        }
      }
      await apiPost({action:'editar_candidato', data:{id, busqueda_id:c.busqueda_id, cv_score:c.cv_score, cv_score_pros:c.cv_score_pros, cv_score_contras:c.cv_score_contras}});
      showToast(`Score actualizado: ${ns}/10 ✓`);
    }
  } catch(err) {
    document.getElementById('scoreTyping_'+id)?.remove();
    appendScoreChatMsg(id,'ia','Error: '+err.message);
  }
}

// Audio para el chat de score
async function toggleScoreMic(id) {
  const state = _scoreChatState[id]||(_scoreChatState[id]={history:[],mic:null});
  const btn = document.getElementById('scoreMicBtn_'+id);
  if(state.mic) {
    state.mic.stop();
    state.mic = null;
    if(btn) btn.textContent='🎙';
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    const rec = new MediaRecorder(stream);
    const chunks = [];
    rec.ondataavailable = e=>chunks.push(e.data);
    rec.onstop = async()=>{
      stream.getTracks().forEach(t=>t.stop());
      if(btn) btn.textContent='🎙';
      state.mic=null;
      const blob = new Blob(chunks,{type:'audio/webm'});
      const reader = new FileReader();
      reader.onloadend = async()=>{
        const b64 = reader.result.split(',')[1];
        showToast('Transcribiendo...');
        const r = await apiPost({action:'sourcing_transcribir',data:{audio:b64}});
        if(r.status==='ok'&&r.data?.texto) {
          const inp = document.getElementById('scoreChatInput_'+id);
          if(inp) inp.value=r.data.texto;
        }
      };
      reader.readAsDataURL(blob);
    };
    rec.start();
    state.mic = rec;
    if(btn) btn.textContent='⏹';
  } catch(e) { showToast('No se pudo acceder al micrófono','error'); }
}

function getTemplateMensaje(etapa, c, b) {
  const u = App.user?.nombre || '';
  const tmpl = TEMPLATES_BASE[etapa] || TEMPLATES_BASE['Contactados'];
  const lsKey = 'tmpl_' + etapa;
  const saved = localStorage.getItem(lsKey);
  if (saved) return saved.replace(/\{nombre\}/g, c.nombre?.split(' ')[0]||'').replace(/\{puesto\}/g, b.puesto||'').replace(/\{cliente\}/g, b.cliente||'').replace(/\{recruiter\}/g, u);
  return tmpl.mensaje(c, b, u);
}

function saveTemplateMensaje(etapa, texto, c, b) {
  const u = App.user?.nombre || '';
  const nombre = c.nombre?.split(' ')[0] || '';
  const generico = texto
    .replace(new RegExp(nombre, 'g'), '{nombre}')
    .replace(new RegExp(b.puesto||'XXXXX', 'g'), '{puesto}')
    .replace(new RegExp(b.cliente||'XXXXX', 'g'), '{cliente}')
    .replace(new RegExp(u||'XXXXX', 'g'), '{recruiter}');
  localStorage.setItem('tmpl_' + etapa, generico);
}

async function procesarNotasIA(id) {
  const notas = document.getElementById('notasCandidato_'+id)?.value||'';
  if(!notas.trim()) { showToast('Escribí algo en las notas primero','error'); return; }
  const c = App.data.candidatos.find(x=>x.id===id);
  if(!c) return;
  const b = App.data.busquedas.find(x=>x.id===c.busqueda_id)||{};

  // Guardar notas primero
  await apiPost({action:'editar_candidato',data:{id,busqueda_id:c.busqueda_id,notas}});
  c.notas = notas;

  showToast('Procesando notas con IA...');
  const btn = document.querySelector(`button[onclick="procesarNotasIA('${id}')"]`);
  if(btn){btn.disabled=true;btn.textContent='⏳ Procesando...';}

  try {
    const r = await apiPost({action:'procesar_notas', data:{
      nombre: c.nombre||'',
      puesto: b.puesto||'', cliente: b.cliente||'', seniority: b.seniority||'',
      must_haves: b.must_haves||'', criterio_si: b.criterio_si||'',
      cv_score: c.cv_score||'', cv_score_pros: c.cv_score_pros||'', cv_score_contras: c.cv_score_contras||'',
      resumen_ejecutivo: c.resumen_ejecutivo||'',
      notas
    }});

    if(r.status!=='ok') { showToast(r.message||'Error al procesar','error'); return; }
    const d = r.data;

    // Actualizar candidato en memoria
    if(d.nuevo_score != null) c.cv_score = d.nuevo_score;
    if(d.nuevos_pros)    c.cv_score_pros    = JSON.stringify(d.nuevos_pros);
    if(d.nuevos_contras) c.cv_score_contras = JSON.stringify(d.nuevos_contras);
    if(d.resumen_ejecutivo) c.resumen_ejecutivo = d.resumen_ejecutivo;

    // Guardar todo en el sheet
    await apiPost({action:'editar_candidato', data:{
      id, busqueda_id: c.busqueda_id,
      cv_score: c.cv_score,
      cv_score_pros: c.cv_score_pros,
      cv_score_contras: c.cv_score_contras,
      resumen_ejecutivo: c.resumen_ejecutivo||''
    }});

    // Actualizar bloque de score en el DOM sin re-abrir el modal
    const ns = normScore(c.cv_score);
    const color   = ns>=7?'bg-green-50 border-green-200':ns>=5?'bg-yellow-50 border-yellow-200':'bg-red-50 border-red-200';
    const tcol    = ns>=7?'text-green-800':ns>=5?'text-yellow-800':'text-red-800';
    const vcol    = ns>=7?'text-green-600':ns>=5?'text-yellow-600':'text-red-500';
    const scoreBlock = document.getElementById('scoreBlock_'+id);
    if(scoreBlock) {
      scoreBlock.className = `rounded-xl border p-4 mb-4 ${color}`;
      const numEl = scoreBlock.querySelector('.text-2xl');
      if(numEl){numEl.textContent=ns; numEl.className=`text-2xl font-black ${vcol}`;}
      const lblEl = scoreBlock.querySelector('[data-score-label]');
      if(lblEl){lblEl.textContent=`Score IA: ${ns}/10`; lblEl.className=`text-xs font-bold uppercase tracking-wide ${tcol}`;}
      const pc = document.getElementById('scoreProsContras_'+id);
      if(pc){
        const prosHtml    = c.cv_score_pros    ? `<div><p class="text-xs font-semibold text-green-700 mb-1">✓ A favor</p><ul class="space-y-0.5">${toArr(c.cv_score_pros).map(p=>`<li class="text-xs text-gray-600">• ${p}</li>`).join('')}</ul></div>` : '';
        const contrasHtml = c.cv_score_contras ? `<div><p class="text-xs font-semibold text-red-600 mb-1">✗ En contra</p><ul class="space-y-0.5">${toArr(c.cv_score_contras).map(p=>`<li class="text-xs text-gray-600">• ${p}</li>`).join('')}</ul></div>` : '';
        pc.innerHTML = prosHtml + contrasHtml;
      }
    }

    // Mostrar resumen de lo que cambió
    const cambios = [];
    if(d.nuevo_score != null) cambios.push(`Score → ${ns}/10`);
    if(d.nuevos_pros)         cambios.push('pros actualizados');
    if(d.nuevos_contras)      cambios.push('contras actualizados');
    showToast('✓ ' + (cambios.length ? cambios.join(' · ') : 'Notas procesadas'));

    // Mostrar resumen en el chat de score si está abierto
    if(d.resumen_cambios) {
      if(!_scoreChatState[id]) _scoreChatState[id]={history:[],mic:null};
      const chatEl = document.getElementById('scoreChat_'+id);
      if(chatEl && !chatEl.classList.contains('hidden')) {
        appendScoreChatMsg(id,'ia','[Notas procesadas] '+d.resumen_cambios);
      }
    }

  } catch(err) {
    showToast('Error: '+err.message,'error');
  } finally {
    if(btn){btn.disabled=false;btn.textContent='✨ Procesar';}
  }
}

async function submitBusqueda(e) {
  e.preventDefault();
  const fd=new FormData(e.target);
  const d=Object.fromEntries(fd.entries());
  // Collect multi-checkbox recruiter_asignado
  d.recruiter_asignado=fd.getAll('recruiter_asignado').join(', ');
  const leadId=d.lead_id; delete d.lead_id;
  const briefingRaw=d._briefing; delete d._briefing;
  const briefing=tryJSON(briefingRaw,{});
  const busqueda={...d,...briefing,id:generateId('B')};
  let r;
  if(leadId) r=await apiPost({action:'aprobar_lead',data:{lead_id:leadId,busqueda}});
  else r=await apiPost({action:'nueva_busqueda',data:busqueda});
  if(r.status==='ok'){
    showToast('Búsqueda creada ✓');
    closeModal();
    // Si vino con briefing del PDF, ir directo al pipeline
    if(briefingRaw) { App.data.busquedaActiva=busqueda.id; await loadSection('pipeline'); }
    else await loadSection(leadId?'leads':'busquedas');
  } else showToast(r.message||'Error','error');
}

async function submitEditBusqueda(e,id) {
  e.preventDefault();
  const fd=new FormData(e.target);
  const d=Object.fromEntries(fd.entries());
  d.recruiter_asignado=fd.getAll('recruiter_asignado').join(', ');
  const r=await apiPost({action:'editar_busqueda',data:{id,...d}});
  if(r.status==='ok'){showToast('Búsqueda actualizada ✓');closeModal();await loadSection('busquedas');}
  else showToast(r.message||'Error','error');
}

async function leadUploadJD(input) {
  const file = input.files[0];
  if (!file) return;
  const t = LANDING_COPY[_landingLang];
  const statusEl = document.getElementById('leadJdStatus');
  const textoEl = document.getElementById('leadJdTexto');
  statusEl.className = 'ml-3 text-xs text-gray-400';
  statusEl.textContent = t.f_jd_processing;

  try {
    const base64 = await new Promise((res, rej) => {
      const reader = new FileReader();
      reader.onload = e => res(e.target.result.split(',')[1]);
      reader.onerror = rej;
      reader.readAsDataURL(file);
    });

    const r = await apiPostPublic({ action: 'parsear_jd_publico', data: { filename: file.name, base64data: base64 } });
    if (r.status !== 'ok') throw new Error(r.message || 'Error');

    const p = r.data;
    if (textoEl) textoEl.value = p.jd_texto || '';

    // Solo llenar empresa y puesto
    const empresaEl = document.getElementById('lead_empresa');
    const puestoEl = document.getElementById('lead_puesto');
    if (empresaEl && p.cliente) empresaEl.value = p.cliente;
    if (puestoEl && p.puesto) puestoEl.value = p.puesto;

    // Con JD cargada, empresa y puesto dejan de ser obligatorios
    if (empresaEl) { empresaEl.required = false; document.getElementById('empresa_req').style.display='none'; }
    if (puestoEl) { puestoEl.required = false; document.getElementById('puesto_req').style.display='none'; }

    statusEl.textContent = t.f_jd_done;
    statusEl.className = 'ml-3 text-xs text-green-500 font-medium';
  } catch(err) {
    statusEl.textContent = '❌ ' + (err.message || 'Error al procesar el archivo');
    statusEl.className = 'ml-3 text-xs text-red-400';
    console.error('leadUploadJD error:', err);
  }
}

async function submitLead(e) {
  e.preventDefault();
  const btn=document.getElementById('leadSubmitBtn');
  btn.disabled=true; btn.textContent='Enviando...';
  try {
    const fd=new FormData(e.target);
    const r=await apiPostPublic({action:'nuevo_lead',data:Object.fromEntries(fd.entries())});
    if(r.status==='ok'){
      e.target.reset();
      e.target.style.display='none';
      const s=document.getElementById('leadSuccessMsg'); if(s) s.style.display='block';
    } else showToast(r.message||'Error al enviar','error');
  } catch(err){showToast('Error de conexión','error');}
  btn.disabled=false; btn.textContent=LANDING_COPY[_landingLang].f_submit;
}

function copiarLinkPostulacion(bid) {
  const shortCode = bid.split('_').pop();
  const url = `${window.location.origin}${window.location.pathname}?j=${shortCode}`;
  navigator.clipboard.writeText(url).then(()=>showToast('Link de postulación copiado ✓'));
}

async function initApply(param) {
  App.view='apply'; App._applyState='loading'; render();
  try {
    const r = await apiGet({});
    // param puede ser el id completo o el short code (últimos 4 chars del id)
    const busqueda = (r.busquedas||[]).find(b=>b.id===param || b.id.endsWith('_'+param));
    if (!busqueda) throw new Error('Búsqueda no encontrada');
    App._applyData = busqueda;
    App._applyBid = busqueda.id;
    App._applyState = 'ok';
  } catch(err) {
    App._applyState = 'error'; App._applyError = err.message;
  }
  render();
}

async function submitPostulacion(e, bid) {
  e.preventDefault();
  const btn = document.getElementById('applySubmitBtn');
  const statusEl = document.getElementById('applyCvStatus');
  const file = document.getElementById('applyCvFile').files[0];
  if (!file) { showToast('Subí tu CV en PDF','error'); return; }
  btn.disabled = true; btn.textContent = 'Enviando...';
  try {
    statusEl.textContent = '📄 Leyendo CV...';

    const base64 = await new Promise((res,rej)=>{
      const reader=new FileReader();
      reader.onload=e=>res(e.target.result.split(',')[1]);
      reader.onerror=rej;
      reader.readAsDataURL(file);
    });

    // Intentar extraer texto con pdf.js (falla silenciosamente en scaneados)
    let cvText = '';
    try {
      if (typeof pdfjsLib !== 'undefined') {
        pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const pdf = await pdfjsLib.getDocument({data: new Uint8Array(await file.arrayBuffer())}).promise;
        for (let i=1;i<=pdf.numPages;i++){
          const page=await pdf.getPage(i);
          const content=await page.getTextContent();
          cvText+=content.items.map(item=>item.str).join(' ')+'\n';
        }
      }
    } catch(_) {}
    if (!cvText.trim()) statusEl.textContent = '📷 PDF escaneado — el servidor hará el OCR...';

    // Recolectar campos del form
    const fd = new FormData(e.target);
    const d = Object.fromEntries(fd.entries());
    const expectativa = d.expectativa_salarial || '';

    // Recolectar respuestas a preguntas filtro
    const respuestasFiltro = {};
    const preguntas = toArr(App._applyData?.preguntas_filtro||'');
    preguntas.forEach((p,i)=>{ if(d[`filtro_${i}`]) respuestasFiltro[p]=d[`filtro_${i}`]; });

    statusEl.textContent = '✨ Enviando postulación...';
    const r = await apiPostPublic({ action:'nueva_postulacion', data:{
      busqueda_id:         bid,
      puesto:              App._applyData?.puesto || '',
      nombre:              d.nombre || '',
      email:               d.email || '',
      cv_text:             cvText,
      base64data:          base64,
      filename:            file.name,
      recruiter_id:        App._applyBy||'',
      expectativa_salarial: expectativa,
      respuestas_filtro:   JSON.stringify(respuestasFiltro),
      respuestas:          preguntas.map((p,i)=>`${p}: ${d[`filtro_${i}`]||'—'}`).join('\n'),
    }});
    if (r.status!=='ok') throw new Error(r.message||'Error al enviar');
    App._applyState = 'sent';
    render();
  } catch(err) {
    showToast(err.message||'Error','error');
    statusEl.textContent = '❌ '+(err.message||'Error');
    btn.disabled = false; btn.textContent = 'Postularme →';
  }
}

async function apiGet(params) {
  const qs = new URLSearchParams({ ...params, pin: App.user?.pin || '' }).toString();
  const r = await fetch(`${WEBHOOK}?${qs}`, { credentials:'omit', redirect:'follow' });
  return r.json();
}
async function apiPost(body) {
  const r = await fetch(WEBHOOK, {
    method:'POST', credentials:'omit', redirect:'follow',
    headers:{ 'Content-Type':'text/plain' },
    body: JSON.stringify({ ...body, pin: App.user?.pin || '' }),
  });
  return r.json();
}
async function apiPostPublic(body) {
  const r = await fetch(WEBHOOK, {
    method:'POST', credentials:'omit', redirect:'follow',
    headers:{ 'Content-Type':'text/plain' },
    body: JSON.stringify(body),
  });
  return r.json();
}

function tryJSON(str, fallback) { try { return JSON.parse(str); } catch { return fallback; } }
function normalizeWA(raw) {
  const n = String(raw||'').replace(/\D/g,'');
  if (!n || n.length < 6) return '';
  // Argentina: 54 + 11 + 8 dígitos = 12 → agregar 9 → 549...
  if (n.startsWith('54') && n.length === 12) return '549' + n.slice(2);
  // Argentina sin código de país: empieza con 11/15 y tiene 10 dígitos
  if ((n.startsWith('11')||n.startsWith('15')) && n.length === 10) return '549' + n;
  // Argentina solo número local: 8 dígitos
  if (n.length === 8) return '5491' + n;
  // Ya tiene formato correcto (13+ dígitos con 549, o internacional)
  return n;
}
function toArr(str) { if (!str) return []; const p = tryJSON(str, null); if (Array.isArray(p)) return p; return String(str).split(/\n|•/).map(s=>s.trim()).filter(Boolean); }
function fmtMoney(n, moneda='') { if (!n && n!==0) return '—'; return (moneda?moneda+' ':'')+Number(n).toLocaleString('es-AR'); }
function fmtMoneyMulti(byCurrency) { const parts=Object.entries(byCurrency||{}).filter(([,v])=>v).map(([cur,v])=>fmtMoney(v,cur)); return parts.length?parts.join(' · '):'—'; }
function normScore(s) { const n=Number(s); if(!n&&n!==0) return null; if(n>10) return Math.round(n/10*10)/10; if(n>0&&n<=1) return Math.round(n*10*10)/10; return n; }
function fmtDate(s) { if(!s) return '—'; return new Date(s).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function badge(t,c) { return `<span class="inline-block px-2 py-0.5 rounded text-xs font-medium ${c}">${t}</span>`; }
function estadoBadge(e) {
  const m={activa:'bg-green-100 text-green-700',pausada:'bg-yellow-100 text-yellow-700',cerrada:'bg-blue-100 text-blue-700',perdida:'bg-red-100 text-red-700',pendiente:'bg-amber-100 text-amber-700',aprobado:'bg-green-100 text-green-700',descartado:'bg-red-100 text-red-700'};
  return badge(e, m[e]||'bg-gray-100 text-gray-700');
}
function prioridadBadge(p) {
  const m={alta:'bg-red-100 text-red-700',media:'bg-yellow-100 text-yellow-700',baja:'bg-slate-100 text-slate-600'};
  return badge(p, m[p]||'bg-gray-100 text-gray-600');
}

function showToast(msg, type='ok') {

// ═══════════════════════════════════════════════════════════════
// AUTH & ROUTING
// ═══════════════════════════════════════════════════════════════
async function doLogin(pin) {
  if (!pin||pin.trim()==='') { showToast('Ingresá el PIN','error'); return; }
  App.loading=true; render();
  try {
    const j = await apiPostPublic({ action:'login', data:{ pin: pin.trim() } });
    if (j.status==='ok') {
      App.user={...j.data,pin:pin.trim()};
      apiGet({action:'recruiters'}).then(r=>{ App.data.recruiters=r.data||[]; });
      navigate('panel','pipeline');
    }
    else { showToast('PIN incorrecto','error'); App.loading=false; render(); }
  } catch(e) { showToast('Error de red: '+e.message,'error'); App.loading=false; render(); }
}
function doLogout() {
  App.user=null;
  App.data={leads:[],busquedas:[],candidatos:[],kpis:null,config:{},busquedaActiva:null,equipoNombres:[],vistaPersona:null,recruiters:[]};
  navigate('landing');
}
function navigate(view, section) {
  App.view=view; if(section) App.section=section; render();
  if(view==='panel') loadSection(App.section);
}
async function loadSection(section) {
  App.section=section; App.loading=true; render();
  try {
    const rd = await apiGet({});
    App.data.busquedas = rd.busquedas || rd.data?.busquedas || [];
    App.data.candidatos = rd.candidatos || rd.data?.candidatos || [];
    App.data.leads = rd.leads || rd.data?.leads || [];
    if (!App.data.busquedaActiva && App.data.busquedas.length) App.data.busquedaActiva=App.data.busquedas[0].id;
  } catch(e) { showToast('Error cargando datos: '+e.message,'error'); }
  App.loading=false; render();
}

function render() {
  let html='';

    html+=`<div class="fixed top-4 right-4 z-50 ${tc} text-white px-4 py-3 rounded-lg shadow-lg text-sm fade-in max-w-xs">${App.toast.msg}</div>`;

}

      <span class="mx-2">·</span><a onclick="navigate('login')" href="#" class="hover:text-gray-500 transition" style="color:#1f2937">⚙</a>

function renderSection() {
  switch(App.section) {
    case 'dashboard':  return renderDashboard();
    case 'leads':      return renderLeads();
    case 'busquedas':  return renderBusquedas();
    case 'pipeline':   return renderPipeline();
    case 'kpis':       return renderKpis();
    case 'ingresos':   return renderIngresos();
    case 'historial':  return renderHistorial();
    default:           return '<div class="p-8 text-gray-400">Sección no encontrada</div>';
  }
}

// ═══════════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════════
function renderDashboard() {
  const busquedas=App.data.busquedas, candidatos=App.data.candidatos||[], isAdmin=App.user?.rol==='admin';
  const hora=new Date().getHours();
  const greeting=hora<12?'Buenos días':hora<18?'Buenas tardes':'Buenas noches';
  const hoy=new Date().toISOString().slice(0,10);
  const nombre=App.user?.nombre?.split(' ')[0]||'';

  const activas=busquedas.filter(b=>b.estado==='activa');
  const cerradas=busquedas.filter(b=>b.estado==='cerrada');

  // Candidatos por etapa crítica
  const enOferta=candidatos.filter(c=>c.etapa==='Oferta'&&activas.find(b=>b.id===c.busqueda_id));
  const en2da=candidatos.filter(c=>c.etapa==='2da entrevista cliente'&&activas.find(b=>b.id===c.busqueda_id));
  const sinMovimiento=candidatos.filter(c=>{
    if(c.etapa==='Descartado'||c.etapa==='Contratado') return false;
    if(!activas.find(b=>b.id===c.busqueda_id)) return false;
    const dias=c.fecha_etapa_actual?Math.floor((Date.now()-new Date(c.fecha_etapa_actual))/(864e5)):null;
    return dias!==null&&dias>5;
  });

  // Garantías por vencer (próximos 30 días)
  const garantiasPorVencer=cerradas.filter(b=>{
    if(!b.fecha_ingreso_contratado||!b.garantia_dias) return false;
    const vence=new Date(new Date(b.fecha_ingreso_contratado).getTime()+Number(b.garantia_dias)*864e5);
    const diasRestantes=Math.floor((vence-Date.now())/864e5);
    return diasRestantes>=0&&diasRestantes<=30;
  }).map(b=>{
    const vence=new Date(new Date(b.fecha_ingreso_contratado).getTime()+Number(b.garantia_dias)*864e5);
    return {...b, dias_restantes:Math.floor((vence-Date.now())/864e5)};
  }).sort((a,b)=>a.dias_restantes-b.dias_restantes);

  // Pipeline financiero ponderado
  const pipelineProb=calcPipelineProb(activas,candidatos);
  const cobradoMes=(()=>{
    const mesKey=hoy.slice(0,7);
    const totals={ARS:0,USD:0};
    cerradas.filter(b=>b.estado_cobro==='cobrado'&&String(b.fecha_cobro||'').slice(0,7)===mesKey)
      .forEach(b=>{
        const moneda=b.moneda==='USD'?'USD':'ARS';
        totals[moneda]+=(Number(isAdmin?b.fee_cabeza:b.fee_recruiter)||Number(b.fee_calculado)||0);
      });
    return totals;
  })();

  // Por búsqueda: cuántos candidatos activos y en qué mejor etapa
  const ORDEN_ETAPA=['Contratado','Oferta','2da entrevista cliente','1ra entrevista cliente','Presentados','Entrevistados','Contactados'];
  const resumenBusquedas=activas.map(b=>{
    const cands=candidatos.filter(c=>c.busqueda_id===b.id&&c.etapa!=='Descartado');
    const mejorEtapa=cands.length?ORDEN_ETAPA.find(e=>cands.some(c=>c.etapa===e))||cands[0].etapa:null;
    const stalled=cands.filter(c=>{const d=c.fecha_etapa_actual?Math.floor((Date.now()-new Date(c.fecha_etapa_actual))/864e5):0;return d>5;}).length;
    return {b,cands,mejorEtapa,stalled};
  }).sort((a,z)=>ORDEN_ETAPA.indexOf(a.mejorEtapa||'')-ORDEN_ETAPA.indexOf(z.mejorEtapa||''));

  const alertas=enOferta.length+en2da.length+sinMovimiento.length+garantiasPorVencer.length;

  return `
  <div class="p-6 max-w-4xl space-y-6">

    <!-- Saludo -->
    <div class="flex items-start justify-between flex-wrap gap-3">
      <div>
        <h2 class="text-xl font-bold">${greeting}${nombre?' '+nombre:''}.</h2>
        <p class="text-sm text-gray-400 mt-0.5">${new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'})} · ${activas.length} búsqueda${activas.length!==1?'s':''} activa${activas.length!==1?'s':''}</p>
      </div>
      ${isAdmin?selectorEquipoHTML():''}
    </div>

    <!-- KPIs -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
      ${statCard('Búsquedas activas', activas.length, 'text-indigo-600')}
      ${statCard('En oferta ahora', enOferta.length, enOferta.length>0?'text-green-600':'text-gray-400')}
      ${statCard('Cobrado este mes', fmtMoneyMulti(cobradoMes), 'text-gray-900')}
      ${statCard('Pipeline proyectado', fmtMoneyMulti(pipelineProb), 'text-blue-600')}
    </div>

    <!-- Alertas -->
    ${alertas>0?`
    <div class="space-y-2">
      <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Atención hoy</p>

      ${enOferta.map(c=>{const b=busquedas.find(x=>x.id===c.busqueda_id)||{};return `
      <div class="flex items-center justify-between bg-green-50 border border-green-200 rounded-xl px-4 py-3 cursor-pointer hover:bg-green-100 transition" onclick="openModal('candidato','${c.id}')">
        <div class="flex items-center gap-3">
          <span class="text-lg">🎯</span>
          <div><p class="text-sm font-semibold text-green-900">${c.nombre} está en Oferta</p><p class="text-xs text-green-700">${b.cliente||''} · ${b.puesto||''}</p></div>
        </div>
        <span class="text-xs text-green-600 font-medium">Ver →</span>
      </div>`}).join('')}

      ${en2da.map(c=>{const b=busquedas.find(x=>x.id===c.busqueda_id)||{};return `
      <div class="flex items-center justify-between bg-blue-50 border border-blue-200 rounded-xl px-4 py-3 cursor-pointer hover:bg-blue-100 transition" onclick="openModal('candidato','${c.id}')">
        <div class="flex items-center gap-3">
          <span class="text-lg">⚡</span>
          <div><p class="text-sm font-semibold text-blue-900">${c.nombre} en 2da entrevista</p><p class="text-xs text-blue-700">${b.cliente||''} · ${b.puesto||''}</p></div>
        </div>
        <span class="text-xs text-blue-600 font-medium">Ver →</span>
      </div>`}).join('')}

      ${garantiasPorVencer.map(b=>`
      <div class="flex items-center justify-between bg-red-50 border border-red-200 rounded-xl px-4 py-3">
        <div class="flex items-center gap-3">
          <span class="text-lg">⏳</span>
          <div><p class="text-sm font-semibold text-red-900">Garantía vence en ${b.dias_restantes} día${b.dias_restantes!==1?'s':''}</p><p class="text-xs text-red-700">${b.candidato_placement||'—'} · ${b.cliente} · ${b.puesto}</p></div>
        </div>
      </div>`).join('')}

      ${sinMovimiento.length?`
      <div class="bg-amber-50 border border-amber-200 rounded-xl px-4 py-3">
        <div class="flex items-center gap-3 mb-2">
          <span class="text-lg">⚠️</span>
          <p class="text-sm font-semibold text-amber-900">${sinMovimiento.length} candidato${sinMovimiento.length!==1?'s':''} sin movimiento +5 días</p>
        </div>
        <div class="space-y-1 pl-9">
          ${sinMovimiento.map(c=>{
            const b=busquedas.find(x=>x.id===c.busqueda_id)||{};
            const dias=Math.floor((Date.now()-new Date(c.fecha_etapa_actual))/864e5);
            return `<div class="flex items-center justify-between"><p class="text-xs text-amber-800"><span class="font-medium">${c.nombre}</span> · ${b.cliente||''} · <span class="text-amber-600">${dias}d en ${c.etapa}</span></p><button onclick="openModal('candidato','${c.id}')" class="text-xs text-amber-700 underline hover:text-amber-900">Ver</button></div>`;
          }).join('')}
        </div>
      </div>`:''}
    </div>`:`
    <div class="bg-green-50 border border-green-100 rounded-xl px-4 py-3 flex items-center gap-3">
      <span class="text-xl">✅</span>
      <p class="text-sm text-green-800 font-medium">Todo en orden — no hay alertas pendientes.</p>
    </div>`}

    <!-- Pipeline por búsqueda -->
    <div>
      <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Estado del pipeline</p>
      ${resumenBusquedas.length===0?`<p class="text-sm text-gray-400">No hay búsquedas activas</p>`:
      resumenBusquedas.map(({b,cands,mejorEtapa,stalled})=>`
      <div class="bg-white border border-gray-200 rounded-xl px-4 py-3 mb-2 cursor-pointer hover:shadow-sm transition" onclick="irAPipeline('${b.id}')">
        <div class="flex items-start justify-between gap-2 flex-wrap">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <p class="text-sm font-semibold text-gray-900">${b.cliente} · ${b.puesto}</p>
              ${prioridadBadge(b.prioridad)}
              ${b.exclusividad==='compartida'?`<span class="text-xs text-orange-600 border border-orange-200 bg-orange-50 rounded-full px-2 py-0.5">Compartida</span>`:''}
            </div>
            <div class="flex items-center gap-3 mt-1 flex-wrap">
              <span class="text-xs text-gray-400">${cands.length} candidato${cands.length!==1?'s':''} activo${cands.length!==1?'s':''}</span>
              ${mejorEtapa?`<span class="text-xs text-gray-600">Mejor etapa: <strong>${mejorEtapa}</strong></span>`:'<span class="text-xs text-gray-400">Sin candidatos</span>'}
              ${stalled?`<span class="text-xs text-amber-600">⚠ ${stalled} sin movimiento</span>`:''}
              ${b.recruiter_asignado?`<span class="text-xs text-gray-400">👤 ${b.recruiter_asignado}</span>`:''}
            </div>
          </div>
          <span class="text-xs text-gray-400 flex-shrink-0">→</span>
        </div>
      </div>`).join('')}
    </div>

  </div>`;
}
function statCard(label,value,valueClass) {
  return `<div class="bg-white border border-gray-200 rounded-xl p-4"><p class="text-xs text-gray-500 mb-1">${label}</p><p class="text-2xl font-bold ${valueClass}">${value}</p></div>`;
}
function selectorEquipoHTML() {
  return `<div class="flex items-center gap-2 flex-wrap">
    <span class="text-xs text-gray-500">Vista:</span>
    <button onclick="cambiarVista(null)" class="text-xs px-3 py-1 rounded-full border ${!App.data.vistaPersona?'bg-gray-900 text-white border-gray-900':'border-gray-300 text-gray-600 hover:border-gray-500'}">Equipo</button>
    ${(App.data.recruiters||[]).map(r=>`<button onclick="cambiarVista(${escAttr(JSON.stringify(r.nombre))})" class="text-xs px-3 py-1 rounded-full border ${App.data.vistaPersona===r.nombre?'bg-gray-900 text-white border-gray-900':'border-gray-300 text-gray-600 hover:border-gray-500'}">${r.nombre}</button>`).join('')}
  </div>`;
}
async function cambiarVista(persona) { App.data.vistaPersona=persona; await loadSection(App.section); }
function irAPipeline(bid) { App.data.busquedaActiva=bid; loadSection('pipeline'); }

// ═══════════════════════════════════════════════════════════════
// LEADS
// ═══════════════════════════════════════════════════════════════
function renderLeads() {
  const leads=App.data.leads;
  const pend=leads.filter(l=>!l.estado||l.estado==='nuevo'||l.estado==='pendiente'||l.estado==='contactado');
  const resto=leads.filter(l=>l.estado&&l.estado!=='nuevo'&&l.estado!=='pendiente'&&l.estado!=='contactado');
  return `
  <div class="p-6 max-w-3xl">
    <h2 class="text-xl font-bold mb-6">Bandeja de Leads</h2>
    ${pend.length===0?'<div class="text-sm text-gray-400 bg-gray-50 rounded-xl p-6 text-center">No hay leads activos</div>':''}
    <div class="space-y-4">${pend.map(l=>renderLeadCard(l,true)).join('')}</div>
    ${resto.length?`<details class="mt-8"><summary class="cursor-pointer text-sm text-gray-500 font-medium mb-3">Ver cerrados (${resto.length})</summary><div class="mt-3 space-y-3 opacity-60">${resto.map(l=>renderLeadCard(l,false)).join('')}</div></details>`:''}
  </div>`;
}

function renderLeadCard(l, showActions) {
  const wa = normalizeWA(l.contacto_whatsapp||l.contacto_telefono||'');
  const waUrl = wa ? `https://wa.me/${wa}` : null;
  const estadoColor = {nuevo:'bg-amber-100 text-amber-700', pendiente:'bg-amber-100 text-amber-700', contactado:'bg-blue-100 text-blue-700', convertido:'bg-green-100 text-green-700', descartado:'bg-gray-100 text-gray-500'}[l.estado]||'bg-gray-100 text-gray-500';
  return `
  <div class="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm">
    <div class="px-5 pt-5 pb-4">
      <div class="flex items-start justify-between gap-3 mb-3">

async function marcarContactadoLead(id) {
  const r = await apiPost({action:'editar_lead', data:{id, estado:'contactado'}});
  if(r.status==='ok'){const l=App.data.leads.find(x=>x.id===id);if(l)l.estado='contactado';render();}
  else showToast(r.message||'Error','error');
}
async function descartarLead(id) {
  if (!confirm('¿Descartar este lead?')) return;
  const r = await apiPost({action:'editar_lead', data:{id, estado:'descartado'}});
  if(r.status==='ok'){const l=App.data.leads.find(x=>x.id===id);if(l)l.estado='descartado';showToast('Lead descartado');render();}
  else showToast(r.message||'Error','error');
}
function aprobarLead(id) { openModal('nueva_busqueda',{lead:App.data.leads.find(x=>x.id===id)}); }

        const b=todas?App.data.busquedas.find(x=>x.id===c.busqueda_id)||{}:busqueda;
        const mustHaves=tryJSON(b?.must_haves,[]);
        const sc=tryJSON(c.scorecard,{});
        const dots=mustHaves.length?`<div class="flex gap-1 mt-2 flex-wrap">${mustHaves.map(mh=>{
          const v=sc[mh];
          const col=v==='si'?'bg-green-400':v==='no'?'bg-red-400':v==='quizas'?'bg-yellow-400':'bg-gray-200';
          return `<span class="w-2 h-2 rounded-full ${col} inline-block" title="${mh}: ${v||'sin evaluar'}"></span>`;

        const siCount=Object.values(sc).filter(v=>v==='si').length;
        return `

          draggable="true"

          onclick="openModal('ver_candidato','${c.id}')"
          style="cursor:grab">

let _dragId=null, _dragBid=null;
function dragStart(e,id,bid) { _dragId=id; _dragBid=bid; e.target.classList.add('dragging'); }
async function dropCandidato(e,etapa,bid) {
  e.preventDefault(); if(!_dragId) return;
  const dragId=_dragId, dragBid=_dragBid;
  _dragId=null; _dragBid=null;
  const c=App.data.candidatos.find(x=>x.id===dragId);
  const prevEtapa=c?.etapa;
  const hoy=new Date().toISOString().slice(0,10);
  if(c){
    c.etapa=etapa;c.fecha_etapa_actual=hoy;
    const hist=tryJSON(c.historial_etapas,[]); hist.push({etapa,fecha:hoy});
    c.historial_etapas=JSON.stringify(hist);
  }
  render();
  const r=await apiPost({action:'mover_candidato',data:{candidato_id:dragId,busqueda_id:dragBid||bid,nueva_etapa:etapa,historial_etapas:c?.historial_etapas||''}});
  if(r.status!=='ok'){
    if(c)c.etapa=prevEtapa; render(); showToast(r.message||'Error','error');
  } else if(etapa==='Contratado') {
    const busqId=dragBid||bid;
    const b=App.data.busquedas.find(x=>x.id===busqId);
    const vacantes=Number(b?.vacantes)||1;
    const contratados=App.data.candidatos.filter(x=>x.busqueda_id===busqId&&x.etapa==='Contratado').length;
    if(b && b.estado!=='cerrada' && contratados<=vacantes) {
      openModal('placement', dragId);
    }
  }
}

// INGRESOS
// ═══════════════════════════════════════════════════════════════
function calcFeeClient(b) {
  if(b.fee_tipo==='fijo') return Number(b.fee_valor)||0;
  if(b.fee_tipo==='%') return (Number(b.fee_base)||0)*(Number(b.fee_valor)||0)/100;
  return 0;
}

// Probabilidad por etapa × exclusividad
const PROB_ETAPA = {'Contactados':0.05,'Entrevistados':0.10,'Presentados':0.18,'1ra entrevista cliente':0.40,'2da entrevista cliente':0.65,'Oferta':0.88,'Contratado':1};
function calcPipelineProb(busquedas, candidatos) {
  // Por cada búsqueda activa con fee, suma fee × prob_etapa × factor_exclusividad, separado por moneda
  const totals={ARS:0,USD:0};
  const excl_factor = {'exclusiva':1,'compartida':0.35};
  busquedas.filter(b=>b.estado==='activa').forEach(b=>{
    const fee=calcFeeClient(b); if(!fee) return;
    const moneda=b.moneda==='USD'?'USD':'ARS';
    const fx=excl_factor[b.exclusividad||'exclusiva']||1;
    const cands=candidatos.filter(c=>c.busqueda_id===b.id&&c.etapa!=='Descartado');
    if(!cands.length){ totals[moneda]+=fee*0.05*fx; return; }
    // Usar el candidato más avanzado por búsqueda
    const maxProb=Math.max(...cands.map(c=>PROB_ETAPA[c.etapa]||0.05));
    totals[moneda]+=fee*maxProb*fx;
  });
  totals.ARS=Math.round(totals.ARS); totals.USD=Math.round(totals.USD);
  return totals;
}

function renderIngresos() {
  const busquedas=App.data.busquedas;
  const candidatos=App.data.candidatos||[];
  const isAdmin=App.user?.rol==='admin';
  const placements=busquedas.filter(b=>b.estado==='cerrada')
    .sort((a,b)=>(b.fecha_cierre||'').localeCompare(a.fecha_cierre||''));
  const activas=busquedas.filter(b=>b.estado==='activa');

  const feeKey=isAdmin?'fee_cabeza':'fee_recruiter';
  const cobrado={ARS:0,USD:0}, pendiente={ARS:0,USD:0}, pipelineTotal={ARS:0,USD:0};
  placements.forEach(b=>{
    const moneda=b.moneda==='USD'?'USD':'ARS';
    const val=Number(b[feeKey])||Number(b.fee_calculado)||0;
    if(b.estado_cobro==='cobrado') cobrado[moneda]+=val; else pendiente[moneda]+=val;
  });
  activas.forEach(b=>{ pipelineTotal[b.moneda==='USD'?'USD':'ARS']+=calcFeeClient(b); });
  const pipelineProb=calcPipelineProb(activas,candidatos);
  const sinFees=isAdmin?placements.filter(b=>!Number(b.fee_calculado)):[];

  // Proyección por búsqueda activa
  const excl_factor={'exclusiva':1,'compartida':0.35};
  const proyPorBusqueda=activas.map(b=>{
    const fee=calcFeeClient(b);
    const fx=excl_factor[b.exclusividad||'exclusiva']||1;
    const cands=candidatos.filter(c=>c.busqueda_id===b.id&&c.etapa!=='Descartado');
    const maxEtapa=cands.length?cands.reduce((best,c)=>(PROB_ETAPA[c.etapa]||0)>(PROB_ETAPA[best.etapa]||0)?c:best,cands[0]):null;
    const prob=maxEtapa?PROB_ETAPA[maxEtapa.etapa]||0.05:0.05;
    return {b,fee,prob,fx,proyectado:Math.round(fee*prob*fx),cands,maxEtapa};
  }).sort((a,z)=>z.proyectado-a.proyectado);

  // Histórico mensual (últimos 6 meses)
  const ahora=new Date();
  const meses=Array.from({length:6},(_,i)=>{
    const d=new Date(ahora.getFullYear(),ahora.getMonth()-5+i,1);
    return {key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,label:d.toLocaleDateString('es-AR',{month:'short',year:'2-digit'})};
  });
  const cobradoPorMesARS={}, cobradoPorMesUSD={};
  placements.filter(b=>b.estado_cobro==='cobrado'&&b.fecha_cobro).forEach(b=>{
    const k=String(b.fecha_cobro).slice(0,7);
    const val=(Number(b[feeKey])||Number(b.fee_calculado)||0);
    if(b.moneda==='USD') cobradoPorMesUSD[k]=(cobradoPorMesUSD[k]||0)+val;
    else cobradoPorMesARS[k]=(cobradoPorMesARS[k]||0)+val;
  });
  const maxMesARS=Math.max(1,...meses.map(m=>cobradoPorMesARS[m.key]||0));
  const maxMesUSD=Math.max(1,...meses.map(m=>cobradoPorMesUSD[m.key]||0));

  return `
  <div class="p-6 max-w-4xl space-y-6">
    <div>
      <h2 class="text-xl font-bold mb-1">Ingresos</h2>
      <p class="text-xs text-gray-400">${isAdmin?'Vista completa · solo para Cabeza':'Tu comisión por placement'}</p>
    </div>

    <!-- KPIs principales -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
      ${statCard('Cobrado total',fmtMoneyMulti(cobrado),'text-green-600')}
      ${statCard('Pendiente cobro',fmtMoneyMulti(pendiente),'text-amber-600')}
      ${statCard('Fee bruto en pipeline',fmtMoneyMulti(pipelineTotal),'text-gray-500')}
      ${statCard('Proyección ponderada',fmtMoneyMulti(pipelineProb),'text-indigo-600')}
    </div>

    <!-- Histórico mensual -->
    <div class="bg-white border border-gray-200 rounded-xl p-4">
      <p class="text-xs font-semibold text-gray-700 mb-4">Histórico de cobros — últimos 6 meses</p>
      <div class="flex items-end gap-2 h-28">
        ${meses.map(m=>{
          const valARS=cobradoPorMesARS[m.key]||0, valUSD=cobradoPorMesUSD[m.key]||0;
          const ratio=Math.max(valARS/maxMesARS, valUSD/maxMesUSD);
          const h=(valARS||valUSD)?Math.max(8,Math.round(ratio*96)):4;
          const esHoy=m.key===`${ahora.getFullYear()}-${String(ahora.getMonth()+1).padStart(2,'0')}`;
          const label=fmtMoneyMulti({ARS:valARS,USD:valUSD});
          return `<div class="flex-1 flex flex-col items-center gap-1">
            <p class="text-gray-500 font-medium text-center leading-tight" style="font-size:8px">${label==='—'?'':label}</p>
            <div class="w-full rounded-t-md ${esHoy?'bg-indigo-500':'bg-gray-200'}" style="height:${h}px"></div>
            <p class="text-xs text-gray-400" style="font-size:9px">${m.label}</p>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- Proyección por búsqueda activa -->
    ${proyPorBusqueda.length?`
    <div class="bg-white border border-gray-200 rounded-xl overflow-hidden">
      <div class="bg-gray-50 px-4 py-2.5 border-b border-gray-100 flex items-center justify-between">
        <p class="text-xs font-semibold text-gray-700">Proyección por búsqueda activa</p>
        <p class="text-xs text-gray-400">Ponderado por etapa × exclusividad</p>
      </div>
      <div class="divide-y divide-gray-100">
        ${proyPorBusqueda.map(({b,fee,prob,fx,proyectado,cands,maxEtapa})=>`
        <div class="px-4 py-3">
          <div class="flex items-start justify-between gap-3">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 flex-wrap">
                <p class="text-sm font-semibold text-gray-900">${b.cliente} · ${b.puesto}</p>
                <span class="text-xs px-2 py-0.5 rounded-full font-medium ${b.exclusividad==='compartida'?'bg-orange-50 text-orange-700 border border-orange-200':'bg-green-50 text-green-700 border border-green-200'}">${b.exclusividad==='compartida'?'Compartida':'Exclusiva'}</span>
              </div>
              <div class="flex items-center gap-3 mt-1 flex-wrap">
                ${fee>0?`<span class="text-xs text-gray-400">Fee: ${fmtMoney(fee,b.moneda||'')}</span>`:`<span class="text-xs text-amber-600 font-medium">⚠ Fee pendiente de configurar</span>`}
                ${maxEtapa?`<span class="text-xs text-gray-400">Mejor etapa: <strong class="text-gray-600">${maxEtapa.etapa}</strong> (${Math.round(prob*100)}%)</span>`:'<span class="text-xs text-gray-400">Sin candidatos activos</span>'}
                ${fx<1?`<span class="text-xs text-orange-500">×${fx} por compartida</span>`:''}
                <span class="text-xs text-gray-300">${cands.length} candidato${cands.length!==1?'s':''} activo${cands.length!==1?'s':''}</span>
              </div>
            </div>
            <div class="text-right flex-shrink-0">
              <p class="text-sm font-bold ${proyectado>0?'text-indigo-700':'text-gray-400'}">${fee>0?fmtMoney(proyectado,b.moneda||''):'—'}</p>
              <p class="text-xs text-gray-400">proyectado</p>
            </div>
          </div>
        </div>`).join('')}
        <div class="px-4 py-3 bg-indigo-50 flex items-center justify-between">
          <p class="text-sm font-semibold text-indigo-900">Total proyectado</p>
          <p class="text-sm font-bold text-indigo-700">${fmtMoneyMulti(pipelineProb)}</p>
        </div>
      </div>
    </div>`:''}

    ${sinFees.length?`
    <div class="bg-red-50 border border-red-200 rounded-xl p-4">
      <p class="text-sm font-semibold text-red-800 mb-2">⚠️ ${sinFees.length} placement${sinFees.length>1?'s':''} sin fees cargados</p>
      ${sinFees.map(b=>`
        <div class="flex items-center justify-between bg-white rounded-lg px-3 py-2 border border-red-100 mb-2">
          <span class="text-sm text-gray-700">${b.cliente} · ${b.puesto} <span class="text-xs text-gray-400">· ${b.candidato_placement||'—'}</span></span>
          <button onclick="openModal('completar_fees','${b.id}')" class="text-xs bg-red-600 text-white px-3 py-1 rounded-lg font-medium hover:bg-red-700 transition">Cargar fees →</button>
        </div>`).join('')}
    </div>`:''}

    <!-- Placements cobrados -->
    ${placements.length===0?`
      <div class="text-center py-12 text-gray-400 text-sm bg-gray-50 rounded-xl">
        <p class="text-2xl mb-2">🎯</p>
        <p>No hay placements registrados todavía.</p>
        <p class="text-xs mt-1">Cuando cerrés una búsqueda por placement, aparece acá.</p>
      </div>`:`
      <div class="bg-white border border-gray-200 rounded-xl overflow-hidden">
        <div class="bg-gray-50 px-4 py-2.5 border-b border-gray-100 flex items-center justify-between">
          <p class="text-xs font-semibold text-gray-700">Placements (${placements.length})</p>
          <p class="text-xs text-gray-400">Total cobrado + pendiente: ${fmtMoney(cobrado+pendiente)}</p>
        </div>
        <div class="divide-y divide-gray-100">
          ${placements.map(b=>{
            const miFee=Number(b[feeKey])||Number(b.fee_calculado)||0;
            const feeTotal=Number(b.fee_calculado)||0;
            const sinFee=!feeTotal&&isAdmin;
            return `
            <div class="px-4 py-3 ${sinFee?'bg-red-50':''}">
              <div class="flex items-start gap-3 flex-wrap">
                <div class="flex-1 min-w-0">
                  <p class="text-sm font-semibold text-gray-900">${b.cliente} · ${b.puesto}</p>
                  <p class="text-xs text-gray-400 mt-0.5">
                    ${b.candidato_placement?b.candidato_placement+' · ':''}${fmtDate(b.fecha_cierre)}

                  </p>
                  ${isAdmin&&feeTotal?`<p class="text-xs text-gray-500 mt-1">
                    Fee total: <strong>${fmtMoney(feeTotal,b.moneda||'')}</strong>
                    ${b.fee_recruiter?' · Recruiter: '+fmtMoney(b.fee_recruiter,b.moneda||''):''}

                </div>
                <div class="flex items-center gap-2 flex-shrink-0">
                  ${sinFee
                    ?`<button onclick="openModal('completar_fees','${b.id}')" class="text-xs bg-red-600 text-white px-3 py-1.5 rounded-lg font-medium hover:bg-red-700 transition">Cargar fees →</button>`
                    :`<div class="text-right">

                </div>

          }).join('')}
        </div>
      </div>`}
  </div>`;
}

function renderHistorial() {
  const busquedas=App.data.busquedas;

  const cerradas=busquedas.filter(b=>b.estado==='cerrada');
  const perdidas=busquedas.filter(b=>b.estado==='perdida');
  const todas=[...cerradas,...perdidas].sort((a,b)=>(b.fecha_cierre||'').localeCompare(a.fecha_cierre||''));
  const total=busquedas.length;
  const tasaCierre=(cerradas.length+perdidas.length)>0?Math.round(cerradas.length/(cerradas.length+perdidas.length)*100):0;

  const motivoStats={};
  perdidas.forEach(b=>{const m=b.motivo_cierre||'Sin especificar';motivoStats[m]=(motivoStats[m]||0)+1;});

          <span class="text-xs bg-white border border-amber-200 text-amber-800 px-3 py-1.5 rounded-lg">
            <strong>${n}</strong> — ${m}
          </span>`).join('')}
      </div>
    </div>`:''}

    ${todas.length===0?`
      <div class="text-center py-12 text-gray-400 text-sm bg-gray-50 rounded-xl">
        <p>No hay búsquedas cerradas todavía.</p>

    `:`

        ${todas.map(b=>{
          const cands=candidatos.filter(c=>c.busqueda_id===b.id);
          const esCerrada=b.estado==='cerrada';

          cands.forEach(c=>{etapasCount[c.etapa]=(etapasCount[c.etapa]||0)+1;});

            <div class="flex items-start justify-between gap-3 flex-wrap mb-2">

                  <span class="text-gray-700">${b.puesto}</span>
                  ${b.seniority?`<span class="text-gray-400 text-sm">${b.seniority}</span>`:''}
                </div>
                <div class="flex items-center gap-2 text-xs flex-wrap">

                    :`<span class="bg-red-100 text-red-700 px-2 py-0.5 rounded-full font-medium">✗ Perdida</span>`}

function renderModal() {
  if(!App.modal) return '';
  const {type,payload}=App.modal;
  let content='';
  try {
    if(type==='nueva_busqueda')  content=modalNuevaBusqueda(payload);
    else if(type==='editar_busqueda') content=modalEditarBusqueda(payload);
    else if(type==='nuevo_candidato') content=modalNuevoCandidato(payload);
    else if(type==='ver_candidato')   content=modalVerCandidato(payload);
    else if(type==='editar_candidato') content=modalEditarCandidato(payload);
    else if(type==='briefing')   content=modalBriefing(payload);
    else if(type==='pagina_candidato') content=modalPaginaCandidato(payload);
    else if(type==='parsear_jd') content=modalParsearJD(payload);
    else if(type==='confirmar_eliminar_busqueda') content=modalConfirmarEliminarBusqueda(payload);
    else if(type==='placement') content=modalPlacement(payload);
    else if(type==='cerrar_busqueda') content=modalCerrarBusqueda(payload);
    else if(type==='completar_fees') content=modalCompletarFees(payload);
    else if(type==='sourcing_ia') content=modalSourcingIA(payload);
    else if(type==='resumen_pipeline') content=modalResumenPipeline(payload);
    else if(type==='ficha_entrevista') content=modalFichaEntrevista(payload);
    else if(type==='template_mensaje') content=modalTemplateMensaje(payload);
    else if(type==='coaching') content=modalCoaching(payload);
  } catch(err) {
    content=`<div class="p-6"><div class="flex items-center justify-between mb-4"><h3 class="text-lg font-bold text-red-600">Error al abrir</h3><button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">×</button></div><p class="text-sm text-gray-600 bg-red-50 rounded-lg p-3">${err.message}</p></div>`;
  }
  return `
  <div class="fixed inset-0 z-40 flex items-end md:items-center justify-center px-0 md:px-4">
    <div class="absolute inset-0 bg-black/40" onclick="closeModal()"></div>
    <div class="relative bg-white rounded-t-2xl md:rounded-2xl shadow-2xl w-full md:max-w-lg max-h-[90vh] overflow-y-auto fade-in">
      ${content}
    </div>
  </div>`;
}

function modalHeader(title) {
  return `<div class="flex items-center justify-between mb-5"><h3 class="text-lg font-bold">${title}</h3><button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">×</button></div>`;
}

function modalPaginaCandidato(bid) {

function fmtJD(tipo) {
  const ta = document.getElementById('jdTextoArea');
  if (!ta) return;
  const start = ta.selectionStart, end = ta.selectionEnd;
  const sel = ta.value.substring(start, end);
  let repl = '';
  if (tipo === 'bold') repl = `**${sel||'texto'}**`;
  if (tipo === 'bullet') repl = (sel ? sel.split('\n').map(l=>'• '+l.trim()).join('\n') : '• ');
  ta.setRangeText(repl, start, end, 'select');
  ta.focus();
}

async function actualizarBriefingConFeedback(bid) {
  const feedback = document.getElementById('feedbackClienteTexto')?.value || '';
  if (!feedback.trim()) { showToast('Pegá el feedback primero','error'); return; }
  const btn = document.getElementById('btnActualizarFeedback');
  btn.disabled = true; btn.textContent = '✨ Actualizando...';
  try {
    const f = document.getElementById('briefingForm');
    const mh = f.querySelector('[name="must_haves"]').value.split('\n').map(s=>s.trim()).filter(Boolean);
    const nth = f.querySelector('[name="nice_to_haves"]').value.split('\n').map(s=>s.trim()).filter(Boolean);
    const rf = f.querySelector('[name="red_flags"]').value.split('\n').map(s=>s.trim()).filter(Boolean);
    const criterioSi = f.querySelector('[name="criterio_si"]').value;
    const r = await apiPost({ action: 'actualizar_briefing_feedback', data: {
      must_haves: JSON.stringify(mh), nice_to_haves: JSON.stringify(nth),
      red_flags: JSON.stringify(rf), criterio_si: criterioSi, feedback,
    }});
    if (r.status !== 'ok') throw new Error(r.message||'Error');
    const p = r.data;
    if (p.must_haves) f.querySelector('[name="must_haves"]').value = p.must_haves.join('\n');
    if (p.nice_to_haves) f.querySelector('[name="nice_to_haves"]').value = p.nice_to_haves.join('\n');
    if (p.red_flags) f.querySelector('[name="red_flags"]').value = p.red_flags.join('\n');
    if (p.criterio_si) f.querySelector('[name="criterio_si"]').value = p.criterio_si;
    document.getElementById('feedbackClienteTexto').value = '';
    showToast('Briefing actualizado — revisá los cambios y guardá ✓');
  } catch(err) {
    showToast(err.message||'Error','error');
  }
  btn.disabled = false; btn.textContent = '✨ Actualizar briefing con este feedback';
}

async function ejecutarParseJD(bid) {
  const jdText=document.getElementById('jdText')?.value?.trim();
  const notasText=document.getElementById('notasText')?.value?.trim();
  if(!jdText && !notasText){showToast('Pegá la JD o las notas de alineamiento','error');return;}
  const btn=document.getElementById('parseBtn');
  if(btn){btn.disabled=true;btn.textContent='Procesando con IA...';}
  try {
    // Guardar textos en el sheet
    const saves={id:bid};
    if(jdText) saves.jd_texto=jdText;
    if(notasText) saves.notas_alineamiento=notasText;
    if(Object.keys(saves).length>1) {
      await apiPost({action:'editar_busqueda',data:saves});
      const b=App.data.busquedas.find(x=>x.id===bid);
      if(b) Object.assign(b,saves);
    }
    const r=await apiPost({action:'parsear_jd',data:{jd_text:jdText||'',notas_text:notasText||'',busqueda_id:bid}});
    if(r.status==='ok'){
      App._parsedBriefing=r.data;
      App.modal={type:'briefing',payload:bid};
      render();
      showToast('Briefing pre-llenado — revisá y guardá ✓');
    } else {
      showToast(r.message||'Error al parsear','error');
      if(btn){btn.disabled=false;btn.textContent='✨ Parsear con IA';}
    }
  } catch(e) { showToast('Error: '+e.message,'error'); if(btn){btn.disabled=false;btn.textContent='✨ Parsear con IA';} }
}

// PDF DE JD → PIPELINE (subir desde modal Parsear JD)
// ═══════════════════════════════════════════════════════════════
function handleJDPdfDrop(e, bid) {
  e.preventDefault();
  document.getElementById('jdPdfDropZone')?.classList.remove('border-indigo-400','bg-indigo-50');
  const file=e.dataTransfer?.files?.[0];
  if(file && file.type==='application/pdf') handleJDPdfFile(file, bid);
  else showToast('Solo se aceptan archivos PDF','error');
}

async function handleJDPdfFile(file, bid) {
  if(!file) return;
  const statusEl=document.getElementById('jdPdfStatus');
  const dropZone=document.getElementById('jdPdfDropZone');
  if(statusEl){statusEl.classList.remove('hidden');statusEl.textContent='📄 Leyendo PDF...';}
  if(dropZone) dropZone.classList.add('opacity-40','pointer-events-none');
  try {
    if(typeof pdfjsLib==='undefined') throw new Error('pdf.js no cargó — revisá tu conexión');
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const arrayBuffer=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:arrayBuffer}).promise;
    let text='';
    for(let i=1;i<=pdf.numPages;i++){
      const page=await pdf.getPage(i);
      const content=await page.getTextContent();
      text+=content.items.map(item=>item.str).join(' ')+'\n';
    }
    if(statusEl) statusEl.textContent='☁️ Subiendo PDF a Drive...';
    // Subir a Drive
    const base64=await new Promise(res=>{
      const reader=new FileReader();
      reader.onload=()=>res(reader.result.split(',')[1]);
      reader.readAsDataURL(file);
    });
    const r=await apiPost({action:'guardar_jd_pdf',data:{filename:file.name,base64data:base64,busqueda_id:bid}});
    if(r.status!=='ok') throw new Error(r.message||'Error al subir PDF');
    const url=r.data.url;
    // Actualizar en memoria y en el textarea de texto
    const b=App.data.busquedas.find(x=>x.id===bid);
    if(b){
      b.jd_pdf_url=url;
      if(text.trim()) b.jd_texto=text.trim();
    }
    // Pre-llenar el textarea de texto de la JD
    const jdTextArea=document.getElementById('jdText');
    if(jdTextArea && text.trim()) jdTextArea.value=text.trim();
    // Actualizar la zona de drop
    if(dropZone){
      dropZone.classList.remove('opacity-40','pointer-events-none');
      dropZone.className=dropZone.className.replace('border-gray-200','border-green-300 bg-green-50');
      dropZone.innerHTML=`<p class="text-xs text-green-700 font-medium">✅ PDF guardado — <a href="${url}" target="_blank" onclick="event.stopPropagation()" class="underline hover:text-green-900">Ver / descargar</a></p><p class="text-xs text-gray-400 mt-0.5">Hacé clic o arrastrá para reemplazarlo</p>`;
    }
    if(statusEl) statusEl.classList.add('hidden');
    showToast('PDF guardado en Drive ✓');
  } catch(err){
    showToast(err.message,'error');
    if(statusEl){statusEl.textContent='❌ '+err.message;statusEl.classList.add('text-red-500');}
    if(dropZone) dropZone.classList.remove('opacity-40','pointer-events-none');
  }
}

// ═══════════════════════════════════════════════════════════════
// PDF → PARSEAR JD → PRE-LLENAR FORMULARIO
// ═══════════════════════════════════════════════════════════════
function handleJDDrop(e) {
  e.preventDefault();
  document.getElementById('jdDropZone')?.classList.remove('border-indigo-400','bg-indigo-50');
  const file = e.dataTransfer?.files?.[0];
  if (file && file.type === 'application/pdf') handleJDFile(file);
  else showToast('Solo se aceptan archivos PDF', 'error');
}

async function handleJDFile(file) {
  if (!file) return;
  const statusEl = document.getElementById('jdParseStatus');
  const dropZone = document.getElementById('jdDropZone');
  if (statusEl) { statusEl.classList.remove('hidden'); statusEl.textContent = '📄 Leyendo PDF...'; }
  if (dropZone) dropZone.classList.add('opacity-40', 'pointer-events-none');

  try {
    // Extraer texto del PDF con pdf.js
    if (typeof pdfjsLib === 'undefined') throw new Error('pdf.js no cargó — revisá tu conexión a internet');
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let text = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join(' ') + '\n';
    }

    if (!text.trim()) throw new Error('El PDF no tiene texto extraíble (puede ser una imagen escaneada)');

    if (statusEl) statusEl.textContent = '☁️ Guardando PDF en Drive...';

    // Guardar PDF en Google Drive
    const busquedaId = document.getElementById('busquedaForm')?.querySelector('[name="_busqueda_id"]')?.value || '';
    const base64 = await new Promise(res => {
      const reader = new FileReader();
      reader.onload = () => res(reader.result.split(',')[1]);
      reader.readAsDataURL(file);
    });
    const pdfR = await apiPost({ action: 'guardar_pdf', data: { filename: file.name, base64data: base64, busqueda_id: busquedaId } });
    if (pdfR.status === 'ok') {
      const hiddenPdf = document.getElementById('busquedaForm')?.querySelector('[name="jd_pdf_url"]');
      if (hiddenPdf) hiddenPdf.value = pdfR.data.url;
    }

    if (statusEl) statusEl.textContent = '✨ Analizando con IA...';

    // Llamar al Apps Script
    const r = await apiPost({ action: 'parsear_jd', data: { jd_text: text, jd_texto: text } });
    if (r.status !== 'ok') throw new Error(r.message || 'Error al parsear');

    const p = r.data;

    // Pre-llenar campos del formulario
    const f = document.getElementById('busquedaForm');
    if (!f) return;

    const set = (name, val) => { if (!val && val !== 0) return; const el = f.querySelector(`[name="${name}"]`); if (el) el.value = val; };
    const setSelect = (name, val) => {
      if (!val) return;
      const el = f.querySelector(`[name="${name}"]`);
      if (!el) return;
      const opt = [...el.options].find(o => o.value.toLowerCase() === String(val).toLowerCase());
      if (opt) el.value = opt.value;
    };

    set('cliente',            p.cliente);
    set('puesto',             p.puesto);
    set('banda_salarial_min', p.banda_salarial_min);
    set('banda_salarial_max', p.banda_salarial_max);
    setSelect('seniority',    p.seniority);
    setSelect('modalidad',    p.modalidad);
    setSelect('moneda',       p.moneda);

    // Guardar briefing en campo oculto para enviarlo junto con la búsqueda
    const briefing = {
      contexto:       p.contexto       || '',
      dia_a_dia:      p.dia_a_dia      || '',
      must_haves:     JSON.stringify(p.must_haves    || []),
      nice_to_haves:  JSON.stringify(p.nice_to_haves || []),
      red_flags:      JSON.stringify(p.red_flags     || []),
      proceso_cliente:p.proceso_cliente || '',
      criterio_si:    p.criterio_si    || '',
    };
    const briefingInput = f.querySelector('[name="_briefing"]');
    if (briefingInput) briefingInput.value = JSON.stringify(briefing);

    if (statusEl) {
      statusEl.textContent = '✅ Formulario pre-llenado — revisá y completá lo que falta (fee, recruiter)';
      statusEl.classList.add('text-green-600');
      statusEl.classList.remove('text-indigo-600');
    }
    if (dropZone) { dropZone.classList.remove('opacity-40','pointer-events-none'); dropZone.classList.add('hidden'); }

  } catch(err) {
    showToast(err.message, 'error');
    if (statusEl) { statusEl.textContent = '❌ ' + err.message; statusEl.classList.add('text-red-500'); }
    if (dropZone) dropZone.classList.remove('opacity-40','pointer-events-none');
  }
}

function renderScorecard(busquedaId, existingScorecard) {
  const b=App.data.busquedas.find(x=>x.id===busquedaId)||{};
  const mustHaves=tryJSON(b.must_haves,[]);
  const niceToHaves=tryJSON(b.nice_to_haves,[]);
  const redFlags=tryJSON(b.red_flags,[]);
  const allItems=[
    ...mustHaves.map(x=>({label:x,tipo:'must'})),
    ...niceToHaves.map(x=>({label:x,tipo:'nice'})),
    ...redFlags.map(x=>({label:x,tipo:'flag'}))
  ];
  if(!allItems.length) return '';
  const sc=existingScorecard||{};
  const tipoLabel={'must':'✅ Must-have','nice':'⭐ Nice to have','flag':'🚩 Red flag'};
  let lastTipo='';
  return `
  <div class="border border-gray-200 rounded-xl overflow-hidden">
    <div class="bg-gray-50 px-4 py-2.5 border-b border-gray-100">
      <p class="text-xs font-semibold text-gray-700">Scorecard</p>
    </div>
    <div class="divide-y divide-gray-100">
      ${allItems.map((item)=>{
        const val=sc[item.label]||'';
        const header=item.tipo!==lastTipo?(lastTipo=item.tipo,`<div class="px-4 py-1.5 bg-gray-50 border-b border-gray-100"><p class="text-xs font-semibold text-gray-400">${tipoLabel[item.tipo]}</p></div>`):'';
        return `${header}
        <div class="flex items-center justify-between px-4 py-2.5 gap-3">
          <p class="text-xs text-gray-700 flex-1">${item.label}</p>
          <div class="flex gap-1 flex-shrink-0">
            <button type="button" onclick="setScore(this,'${item.label.replace(/'/g,"\\'")}','si')" class="score-btn ${val==='si'?'active-si':''} text-xs px-2.5 py-1 rounded-lg border border-gray-200 hover:bg-green-50">✓ Sí</button>
            <button type="button" onclick="setScore(this,'${item.label.replace(/'/g,"\\'")}','quizas')" class="score-btn ${val==='quizas'?'active-q':''} text-xs px-2.5 py-1 rounded-lg border border-gray-200 hover:bg-yellow-50">? Quizás</button>
            <button type="button" onclick="setScore(this,'${item.label.replace(/'/g,"\\'")}','no')" class="score-btn ${val==='no'?'active-no':''} text-xs px-2.5 py-1 rounded-lg border border-gray-200 hover:bg-red-50">✗ No</button>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>
  <input type="hidden" name="scorecard" id="scorecardInput" value='${JSON.stringify(sc).replace(/'/g,"&#39;")}'>`;
}

function setScore(btn, key, val) {
  // Toggle: si ya está activo, deseleccionar
  const isActive=(val==='si'&&btn.classList.contains('active-si'))||(val==='no'&&btn.classList.contains('active-no'))||(val==='quizas'&&btn.classList.contains('active-q'));
  const actualVal=isActive?'':val;

  // Actualizar draft en memoria
  if(!App.scorecardDraft) App.scorecardDraft={};
  App.scorecardDraft[key]=actualVal;

  // Actualizar hidden input
  const input=document.getElementById('scorecardInput');
  if(input) {
    const current=tryJSON(input.value,{});
    current[key]=actualVal;
    input.value=JSON.stringify(current);
  }

  // Actualizar estilos de los 3 botones de esa fila
  const row=btn.closest('.flex');
  row.querySelectorAll('.score-btn').forEach(b=>b.classList.remove('active-si','active-no','active-q'));
  if(actualVal==='si') btn.classList.add('active-si');
  else if(actualVal==='no') btn.classList.add('active-no');
  else if(actualVal==='quizas') btn.classList.add('active-q');
}

// Cicla el valor del scorecard en la ficha de candidato: vacío→si→no→quizas→vacío
// Guarda automáticamente en el sheet sin necesidad de ir a editar
async function toggleScorecard(candidatoId, mh) {
  const c = App.data.candidatos.find(x=>x.id===candidatoId);
  if (!c) return;
  const sc = tryJSON(c.scorecard, {});
  const ciclo = {undefined:'si', '':'si', si:'no', no:'quizas', quizas:''};
  sc[mh] = ciclo[sc[mh]] ?? 'si';
  c.scorecard = JSON.stringify(sc);
  // guardar en sheet
  await apiPost('editar_candidato', { id: candidatoId, scorecard: c.scorecard });
  // re-render solo el modal sin cerrar
  const modal = document.getElementById('modal');
  if (modal) {
    const inner = document.getElementById('modalInner');
    if (inner) inner.innerHTML = modalVerCandidato(candidatoId);
  }
}

async function submitCandidato(e,busquedaId) {
  e.preventDefault();
  const fd=new FormData(e.target);
  const d=Object.fromEntries(fd.entries());
  if(d.contacto_telefono) d.contacto_telefono=d.contacto_telefono.replace(/\D/g,'');
  if(d.expectativa_salarial) d.expectativa_salarial=(d.expectativa_moneda||'ARS')+' '+d.expectativa_salarial;
  delete d.expectativa_moneda;
  const sc=App._cvScore||{};
  const data={busqueda_id:busquedaId,id:generateId('C'),...d,cv_pdf_url:App._cvPdfUrl||'',
    cv_score:sc.score||'', cv_score_justificacion:sc.justificacion||'',
    cv_score_pros:sc.pros?JSON.stringify(sc.pros):'',
    cv_score_contras:sc.contras?JSON.stringify(sc.contras):'',
    must_haves_evaluados:sc.evaluados?JSON.stringify(sc.evaluados):'',
  };
  const r=await apiPost({action:'nuevo_candidato',data});
  if(r.status==='ok'){App._parsedCV=null;App._cvPdfUrl=null;App._cvScore=null;showToast('Candidato agregado ✓');closeModal();await loadSection('pipeline');}
  else showToast(r.message||'Error','error');
}

async function submitEditCandidato(e,id) {
  e.preventDefault();
  const fd=new FormData(e.target);
  const c=App.data.candidatos.find(x=>x.id===id);
  const d=Object.fromEntries(fd.entries());
  if(d.contacto_telefono) d.contacto_telefono=d.contacto_telefono.replace(/\D/g,'');
  if(d.expectativa_salarial) d.expectativa_salarial=(d.expectativa_moneda||'ARS')+' '+d.expectativa_salarial;
  delete d.expectativa_moneda;
  const sc=App._cvScore||{};
  const data={id,busqueda_id:c?.busqueda_id,...d,cv_pdf_url:App._cvPdfUrl||c?.cv_pdf_url||''};
  if(App._cvScore){
    data.cv_score=sc.score??'';
    data.cv_score_justificacion=sc.justificacion||'';
    data.cv_score_pros=sc.pros?JSON.stringify(sc.pros):'';
    data.cv_score_contras=sc.contras?JSON.stringify(sc.contras):'';
    data.must_haves_evaluados=sc.evaluados?JSON.stringify(sc.evaluados):'';
  }
  const r=await apiPost({action:'editar_candidato',data});
  if(r.status==='ok'){App._cvPdfUrl=null;App._cvScore=null;showToast('Candidato actualizado ✓');closeModal();await loadSection('pipeline');}
  else showToast(r.message||'Error','error');
}

function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function abrirWaConMensaje(tel,msg) {
  if (msg) navigator.clipboard.writeText(msg).then(()=>showToast('Mensaje copiado — pegalo con Cmd+V en el chat 📋'));
  window.open(`https://wa.me/${normalizeWA(tel)}?text=${encodeURIComponent(msg||'')}`,'_blank');
}

  const evals = tryJSON(raw, null);
  if (!Array.isArray(evals) || !evals.length) return '';
  const id = 'mh_'+Math.random().toString(36).slice(2,8);
  const badge = {si:'bg-green-50 text-green-700 ✓ Cumple',parcial:'bg-yellow-50 text-yellow-700 ~ Parcial',no:'bg-red-50 text-red-700 ✗ No cumple',no_se_sabe:'bg-gray-100 text-gray-500 ? No se sabe'};

  <button onclick="document.getElementById('${id}').classList.toggle('hidden')" class="w-full text-xs text-gray-500 border border-dashed border-gray-300 rounded-lg py-1.5 hover:border-gray-400 hover:text-gray-700 transition mt-1 mb-1">🔍 Ver cómo razonó la IA must-have por must-have</button>
  <div id="${id}" class="hidden space-y-2 mb-2">
    ${evals.map(e=>{
      const b=badge[e.cumple]||badge.no_se_sabe;
      const [cls,label]=[b.split(' ').slice(0,2).join(' '),b.split(' ').slice(2).join(' ')];
      return `<div class="border border-gray-100 rounded-lg p-2.5">
        <div class="flex items-center justify-between gap-2 mb-1">
          <p class="text-xs font-medium text-gray-700">${e.must_have||''}</p>
          <span class="text-xs px-2 py-0.5 rounded-full font-medium flex-shrink-0 ${cls}">${label}</span>

        <p class="text-xs text-gray-400">${e.evidencia||'—'}</p>

    }).join('')}

}

}

  const etapaStyle=etapaColor[c.etapa]||'bg-gray-100 text-gray-600';

  // build AI evaluados lookup: must_have text → {cumple, evidencia}
  const mhEvals = tryJSON(c.must_haves_evaluados, null);
  const mhEvalMap = {};
  if (Array.isArray(mhEvals)) mhEvals.forEach(e=>{ if(e.must_have) mhEvalMap[e.must_have.toLowerCase().trim()]=e; });

  const scorecardHtml=mustHaves.length?`

function handleCVDrop(e, formId) {
  e.preventDefault();
  document.getElementById('cvDropZone')?.classList.remove('border-indigo-400','bg-indigo-50');
  const file=e.dataTransfer?.files?.[0];
  if(file && file.type==='application/pdf') handleCVFile(file, formId);
  else showToast('Solo se aceptan archivos PDF','error');
}

async function handleCVFile(file, formId) {
  if(!file) return;
  const statusEl=document.getElementById('cvStatus');
  const dropZone=document.getElementById('cvDropZone');
  if(statusEl){statusEl.classList.remove('hidden');statusEl.textContent='📄 Leyendo CV...';}
  if(dropZone) dropZone.classList.add('opacity-40','pointer-events-none');
  try {
    if(typeof pdfjsLib==='undefined') throw new Error('pdf.js no cargó');
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // Leer como base64 para subir a Drive
    const base64=await new Promise((res,rej)=>{
      const reader=new FileReader();
      reader.onload=e=>res(e.target.result.split(',')[1]);
      reader.onerror=rej;
      reader.readAsDataURL(file);
    });

    // Extraer texto con pdf.js (puede fallar en PDFs escaneados)
    let text='';
    try {
      const arrayBuffer=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:new Uint8Array(arrayBuffer)}).promise;
      for(let i=1;i<=pdf.numPages;i++){
        const page=await pdf.getPage(i);
        const content=await page.getTextContent();
        text+=content.items.map(item=>item.str).join(' ')+'\n';
      }
    } catch(e) { text=''; }

    if(!text.trim()) {
      if(statusEl) statusEl.textContent='📷 PDF escaneado — usando OCR de Google Drive...';
    } else {
      if(statusEl) statusEl.textContent='✨ Subiendo a Drive y procesando con IA...';
    }
    // Get búsqueda context for scoring
    const busquedaId=App.modal?.payload?.busqueda_id||App.data.busquedaActiva;
    const busqueda=App.data.busquedas?.find(x=>x.id===busquedaId)||{};
    const r=await apiPost({action:'parsear_y_guardar_cv',data:{
      cv_text:text, base64data:base64, filename:file.name,
      // Pass briefing for scoring
      puesto:busqueda.puesto||'', cliente:busqueda.cliente||'',
      must_haves:busqueda.must_haves||'', nice_to_haves:busqueda.nice_to_haves||'',
      red_flags:busqueda.red_flags||'', criterio_si:busqueda.criterio_si||'',
      descripcion:busqueda.descripcion||busqueda.contexto||'',
    }});
    if(r.status!=='ok') throw new Error(r.message||'Error al procesar');


    const {url,cv_score,cv_score_justificacion,cv_score_pros,cv_score_contras,must_haves_evaluados,...p}=r.data;
    App._parsedCV=p;
    App._cvPdfUrl=url;
    App._cvScore={score:cv_score,justificacion:cv_score_justificacion,pros:cv_score_pros,contras:cv_score_contras,evaluados:must_haves_evaluados};
    App.modal={...App.modal};
    render();
    const scoreMsg=cv_score?` · Score IA: ${cv_score}/10`:'';
    showToast(p.nombre?`CV guardado: ${p.nombre}${scoreMsg} ✓`:'CV guardado — completá los datos que falten');
  } catch(err) {
    showToast(err.message,'error');
    if(statusEl){statusEl.textContent='❌ '+err.message;statusEl.classList.add('text-red-500');}
    if(dropZone) dropZone.classList.remove('opacity-40','pointer-events-none');
  }
}

async function abrirFichaEntrevista(candidatoId) {
  const c = App.data.candidatos.find(x => x.id === candidatoId);
  const b = App.data.busquedas.find(x => x.id === c?.busqueda_id) || {};
  if (!c) return;
  // Abrir modal con loading
  App.modal = { type: 'ficha_entrevista', payload: { candidatoId, estado: 'loading', ficha: null } };
  render();
  try {
    let mustHaves = b.must_haves || '';
    try { if (mustHaves.startsWith('[')) mustHaves = JSON.parse(mustHaves).join(', '); } catch(e) {}
    const r = await apiPost({ action: 'ficha_entrevista', data: {
      candidato_nombre: c.nombre || '',
      candidato_resumen: c.notas || '',
      cv_score_pros: c.cv_score_pros || '',
      cv_score_contras: c.cv_score_contras || '',
      puesto: b.puesto || '',
      cliente: b.cliente || '',
      seniority: b.seniority || '',
      must_haves: mustHaves,
      nice_to_haves: b.nice_to_haves || '',
      criterio_si: b.criterio_si || '',
      dia_a_dia: b.dia_a_dia || '',
    }});
    if (r.status !== 'ok') throw new Error(r.message);
    App.modal.payload = { candidatoId, estado: 'ok', ficha: r.data };
  } catch(err) {
    App.modal.payload = { candidatoId, estado: 'error', error: err.message };
  }
  render();
}

async function generarCoaching(id) {
  const c = App.data.candidatos.find(x => x.id === id);
  const b = App.data.busquedas.find(x => x.id === c?.busqueda_id) || {};
  if (!c) return;
  const feedback = document.getElementById('coachingFeedback')?.value || '';
  const btn = document.getElementById('coachingBtn');
  btn.disabled = true; btn.textContent = '✨ Generando...';
  try {
    const r = await apiPost({ action: 'coachear_candidato', data: {
      nombre: c.nombre||'', puesto: b.puesto||'', cliente: b.cliente||'',
      seniority: b.seniority||'', resumen_ejecutivo: c.resumen_ejecutivo||'',
      cv_score_pros: c.cv_score_pros||'', cv_score_contras: c.cv_score_contras||'',
      notas: c.notas||'', feedback,
    }});
    if (r.status !== 'ok') throw new Error(r.message||'Error');
    const mensaje = r.data.mensaje || '';
    // Guardar en el candidato para que no se pierda
    await apiPost({ action: 'editar_candidato', data: { id, coaching_feedback: feedback, coaching_mensaje: mensaje } });
    c.coaching_feedback = feedback; c.coaching_mensaje = mensaje;
    document.getElementById('coachingResultWrap').innerHTML = renderCoachingResult(mensaje, String(c.contacto_telefono||'').replace(/\D/g,''));
    showToast('Mensaje generado ✓');
  } catch(err) {
    showToast(err.message||'Error','error');
  }
  btn.disabled = false; btn.textContent = '✨ Generar mensaje de coaching';
}

function descargarCandidatoCSV(id) {
  const c=App.data.candidatos.find(x=>x.id===id);
  if(!c) return;
  const b=App.data.busquedas.find(x=>x.id===c.busqueda_id)||{};
  const campos=[
    ['Nombre',c.nombre||''],['Email',c.contacto_email||''],['Teléfono',c.contacto_telefono||''],
    ['LinkedIn',c.linkedin||''],['Etapa',c.etapa||''],['Empresa',b.cliente||''],
    ['Puesto',b.puesto||''],['Seniority',b.seniority||''],['Recruiter',c.recruiter||''],
    ['Notas',c.notas||''],['Fecha',c.fecha_etapa_actual||''],
  ];
  const csv=campos.map(([k,v])=>`"${k}","${String(v).replace(/"/g,'""')}"`).join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${(c.nombre||'candidato').replace(/\s+/g,'_')}.csv`;
  a.click();
}

// Auto-calc fee from salary when user types salary
function recalcFees(salarioInput, moneda) {
  const sal=Number(salarioInput.value)||0;
  // Try to get fee % from current búsqueda
  const c=App.data.candidatos.find(x=>x.id===App.modal?.payload);
  const b=c?App.data.busquedas.find(x=>x.id===c.busqueda_id):null;
  if(b && b.fee_tipo==='%' && sal>0){
    const fee=sal*(Number(b.fee_valor)||0)/100;
    const feeEl=document.getElementById('feeTotal');
    if(feeEl && !feeEl._manuallyEdited) feeEl.value=Math.round(fee);
  }
}

async function confirmarPlacement(e, candidatoId) {
  e.preventDefault();
  const fd=new FormData(e.target);
  const d=Object.fromEntries(fd.entries());
  const c=App.data.candidatos.find(x=>x.id===candidatoId);
  const b=App.data.busquedas.find(x=>x.id===c?.busqueda_id)||{};
  const vacantes=Number(b.vacantes)||1;
  // Count contratados AFTER this one (optimistically already updated in local state)
  const contratados=App.data.candidatos.filter(x=>x.busqueda_id===b.id&&x.etapa==='Contratado').length;
  const esUltimoPlacement=contratados>=vacantes;
  const r=await apiPost({action:'confirmar_placement',data:{
    candidato_id:candidatoId,
    busqueda_id:c?.busqueda_id,
    candidato_nombre:d.nombre_contratado||c?.nombre,
    candidato_placement_id:candidatoId,
    salario_contratado:d.salario_contratado||0,
    fee_calculado:d.fee_calculado||0,
    fee_recruiter:d.fee_recruiter||0,
    fee_cabeza:isAdmin?(d.fee_cabeza||0):null,
    garantia_dias:d.garantia_dias||90,
    notas_placement:d.notas_placement||'',
    fecha_cierre:d.fecha_cierre,
    fecha_ingreso_contratado:d.fecha_ingreso_contratado||'',
    fecha_cobro_estimada:d.fecha_cobro_estimada||'',
    estado_cobro:'pendiente',
    recruiter_asignado:b.recruiter_asignado||'',
    recruiter_nombre:App.user?.nombre||'',
    cerrar_busqueda:esUltimoPlacement,
    es_admin:isAdmin,
    cliente:b.cliente||'',
    puesto:b.puesto||'',
    moneda:b.moneda||'ARS',
  }});
  if(r.status==='ok'){
    if(esUltimoPlacement && b.id){
      const bLocal=App.data.busquedas.find(x=>x.id===b.id);
      if(bLocal){bLocal.estado='cerrada';bLocal.candidato_placement_id=candidatoId;bLocal.candidato_placement=c?.nombre;}
      showToast(`🎉 ¡Todas las vacantes cubiertas! Búsqueda cerrada.`);
    } else {
      showToast(`✅ Placement ${contratados}/${vacantes} registrado. Quedan ${vacantes-contratados} vacante(s).`);
    }
    closeModal();
    render();
  } else showToast(r.message||'Error','error');
}

var _sourcingSaveTimer = null;
function autoSaveSourcing(bid, field, value) {
  const b = App.data.busquedas.find(x => x.id === bid);
  if (!b) return;
  try {
    const cache = b.sourcing_cache ? JSON.parse(b.sourcing_cache) : {};
    cache[field] = value;
    b.sourcing_cache = JSON.stringify(cache);
  } catch(e) {}
  clearTimeout(_sourcingSaveTimer);
  _sourcingSaveTimer = setTimeout(() => {
    apiPost({action:'editar_busqueda', data:{id: bid, sourcing_cache: b.sourcing_cache}});

// Estado del chat de sourcing
App._sourcingCtx = null; // {bid, sourcing, history}

async function enviarMensajeSourcing(bid) {
  const input = document.getElementById('sourcingChatInput');
  const histEl = document.getElementById('sourcingChatHistory');
  const msg = input?.value?.trim();
  if (!msg || !histEl) return;

  const b = App.data.busquedas.find(x => x.id === bid) || {};
  if (!App._sourcingCtx || App._sourcingCtx.bid !== bid) {
    App._sourcingCtx = { bid, history: [] };
  }

  // Mostrar mensaje del usuario
  input.value = '';
  input.disabled = true;
  histEl.innerHTML += `<div class="flex justify-end"><div class="bg-blue-600 text-white text-xs rounded-2xl rounded-tr-sm px-3 py-2 max-w-[80%]">${msg}</div></div>`;
  histEl.innerHTML += `<div id="sourcingTyping" class="flex justify-start"><div class="bg-gray-100 text-gray-500 text-xs rounded-2xl rounded-tl-sm px-3 py-2">...</div></div>`;
  histEl.scrollTop = histEl.scrollHeight;

  App._sourcingCtx.history.push({ role: 'user', content: msg });

  try {
    const r = await apiPost({ action: 'sourcing_chat', data: {
      puesto: b.puesto, cliente: b.cliente, seniority: b.seniority || '',
      modalidad: b.modalidad || '', must_haves: b.must_haves || '',
      ubicacion: b.ubicacion || 'Buenos Aires, Argentina',
      history: App._sourcingCtx.history,
    }});

    let reply;
    if (r.status === 'ok') {
      if (typeof r.data === 'string') reply = r.data;
      else if (typeof r.data?.respuesta === 'string' && r.data.respuesta.trim()) reply = r.data.respuesta;
      else if (r.data?.respuesta) reply = JSON.stringify(r.data.respuesta, null, 2);
      else reply = 'Listo, actualicé lo que pediste.';
    } else {
      reply = 'Error: ' + (r.message || 'no se pudo responder');
    }
    const updates = (r.status === 'ok' && r.data?.updates) ? r.data.updates : {};
    App._sourcingCtx.history.push({ role: 'assistant', content: String(reply) });

    document.getElementById('sourcingTyping')?.remove();
    histEl.innerHTML += `<div class="flex justify-start"><div class="bg-gray-100 text-gray-800 text-xs rounded-2xl rounded-tl-sm px-3 py-2 max-w-[85%] leading-relaxed whitespace-pre-wrap">${String(reply)}</div></div>`;

    // Aplicar updates a los paneles
    if (updates.mensaje_conexion) {
      const el = document.getElementById('msgConexion');
      if (el) { el.value = updates.mensaje_conexion; document.getElementById('msgLen').textContent = updates.mensaje_conexion.length + ' / 300 caracteres'; }
      histEl.innerHTML += `<div class="text-xs text-green-600 px-2 py-0.5">✓ Mensaje de conexión actualizado</div>`;
    }
    if (updates.mensaje_informal) {
      const el = document.getElementById('msgInformal');
      if (el) el.value = updates.mensaje_informal;
    }
    if (updates.followup) {
      const el = document.getElementById('msgFollowup');
      if (el) el.value = updates.followup;
      histEl.innerHTML += `<div class="text-xs text-green-600 px-2 py-0.5">✓ Follow-up actualizado</div>`;
    }
    if (updates.boolean_linkedin) {
      const el = document.getElementById('boolLinkedIn');
      if (el) el.textContent = updates.boolean_linkedin;
      histEl.innerHTML += `<div class="text-xs text-green-600 px-2 py-0.5">✓ Boolean actualizado</div>`;
    }
    if (updates.keywords && updates.keywords.length) {
      const el = document.getElementById('sourcingKeywordsPanel');
      if (el) el.innerHTML = updates.keywords.map(k=>`<span class="bg-white border border-indigo-200 text-indigo-800 text-xs px-2.5 py-1.5 rounded-lg font-medium cursor-pointer hover:bg-indigo-100 transition" onclick="copyText('${k.replace(/'/g,"\\'")}',this)">${k}</span>`).join('');
      histEl.innerHTML += `<div class="text-xs text-green-600 px-2 py-0.5">✓ Keywords actualizadas</div>`;
    }
    if (updates.titulos && updates.titulos.length) {
      const el = document.getElementById('sourcingTitulosPanel');
      if (el) el.innerHTML = updates.titulos.map(t=>`<span class="bg-white border border-blue-200 text-blue-800 text-xs px-2.5 py-1.5 rounded-lg font-medium cursor-pointer hover:bg-blue-100 transition" onclick="copyText('${t.replace(/'/g,"\\'")}',this)">${t}</span>`).join('');
      histEl.innerHTML += `<div class="text-xs text-green-600 px-2 py-0.5">✓ Títulos actualizados</div>`;
    }
    histEl.scrollTop = histEl.scrollHeight;
  } catch(e) {
    document.getElementById('sourcingTyping')?.remove();
    histEl.innerHTML += `<div class="text-xs text-red-500 px-2">${e.message}</div>`;
  }
  input.disabled = false;
  input.focus();
}

// Grabación de audio para chat de sourcing
var _sourcingMediaRecorder = null;
var _sourcingAudioChunks = [];

async function toggleSourcingRecording(bid) {
  const btn = document.getElementById('sourcingMicBtn');
  if (_sourcingMediaRecorder && _sourcingMediaRecorder.state === 'recording') {
    _sourcingMediaRecorder.stop();
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    _sourcingAudioChunks = [];
    _sourcingMediaRecorder = new MediaRecorder(stream);
    _sourcingMediaRecorder.ondataavailable = e => _sourcingAudioChunks.push(e.data);
    _sourcingMediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      if (btn) { btn.textContent = '🎤'; btn.className = 'px-3 py-2 bg-gray-100 text-gray-600 rounded-xl text-sm hover:bg-gray-200 transition'; }
      const blob = new Blob(_sourcingAudioChunks, { type: 'audio/webm' });
      const base64 = await new Promise(res => {
        const reader = new FileReader();
        reader.onload = e => res(e.target.result.split(',')[1]);
        reader.readAsDataURL(blob);
      });
      const input = document.getElementById('sourcingChatInput');
      if (input) { input.value = '🎤 Transcribiendo...'; input.disabled = true; }
      try {
        const r = await apiPost({ action: 'sourcing_transcribir', data: { audio: base64 } });
        if (r.status === 'ok' && r.data.texto) {
          input.value = r.data.texto;
          input.disabled = false;
          enviarMensajeSourcing(bid);
        } else {
          input.value = '';
          input.disabled = false;
          showToast('No se pudo transcribir el audio', 'error');
        }
      } catch(e) {
        if (input) { input.value = ''; input.disabled = false; }
        showToast('Error al transcribir: ' + e.message, 'error');
      }
    };
    _sourcingMediaRecorder.start();
    if (btn) { btn.textContent = '⏹️'; btn.className = 'px-3 py-2 bg-red-100 text-red-600 rounded-xl text-sm hover:bg-red-200 transition'; }
  } catch(e) {
    showToast('No se pudo acceder al micrófono: ' + e.message, 'error');
  }
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(()=>{
    const orig=btn?.textContent;
    if(btn){btn.textContent='✓ Copiado';setTimeout(()=>{btn.textContent=orig;},1500);}
  });
}

async function submitCompletarFees(e, bid) {
  e.preventDefault();
  const fd=new FormData(e.target);
  const d=Object.fromEntries(fd.entries());
  const r=await apiPost({action:'editar_busqueda',data:{id:bid,...d}});
  if(r.status==='ok'){
    const b=App.data.busquedas.find(x=>x.id===bid);
    if(b){Object.assign(b,d);}
    showToast('Fees guardados ✓');
    closeModal();
    render();
  } else showToast(r.message||'Error','error');
}

async function marcarCobrado(bid) {

  } else showToast(r.message||'Error','error');
}

  <div class="sec-body" contenteditable="true">${c.disponibilidad||'To be confirmed'}</div>
</div>

<div class="section">
  <div class="sec-label" contenteditable="true">Contact</div>
  <div class="contact-grid">
    ${c.contacto_email?`<div class="contact-item"><span class="contact-key" contenteditable="true">Email</span><span class="contact-val" contenteditable="true">${c.contacto_email}</span></div>`:''}
    ${c.contacto_telefono?`<div class="contact-item"><span class="contact-key" contenteditable="true">Phone</span><span class="contact-val" contenteditable="true">${c.contacto_telefono}</span></div>`:''}
    ${c.linkedin?`<div class="contact-item"><span class="contact-key" contenteditable="true">LinkedIn</span><span class="contact-val" contenteditable="true">${c.linkedin}</span></div>`:''}
    ${expStr?`<div class="contact-item"><span class="contact-key" contenteditable="true">Salary expectation</span><span class="contact-val" contenteditable="true">${expStr}</span></div>`:''}
    ${c.ubicacion?`<div class="contact-item"><span class="contact-key" contenteditable="true">Location</span><span class="contact-val" contenteditable="true">${c.ubicacion}</span></div>`:''}
  </div>
</div>

<div class="footer">
  <div class="footer-left">
    <img src="https://kbgbrecruiting.github.io/logo.png" style="height:28px;width:auto">
    <span class="footer-brand">KBGB Recruiting</span>
  </div>
  <span class="footer-ref" contenteditable="true">${b.puesto||''} · ${b.cliente||''}</span>
</div>
</body></html>`;
  const win=window.open('','_blank');
  win.document.write(html);
  win.document.close();
}

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KBGB Recruiting</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Inter', sans-serif; }
  .drag-over { outline: 2px dashed #6366f1; background: #eef2ff; }
  .dragging { opacity: 0.4; }
  .fade-in { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
  .kanban-col { min-height: 200px; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .score-btn { transition: all 0.1s; }
  .score-btn.active-si  { background:#dcfce7; color:#15803d; border-color:#86efac; }
  .score-btn.active-no  { background:#fee2e2; color:#b91c1c; border-color:#fca5a5; }
  .score-btn.active-q   { background:#fef9c3; color:#92400e; border-color:#fde68a; }
</style>
</head>
<body class="bg-white text-gray-900">
<div id="root"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONSTANTS & STATE
// ═══════════════════════════════════════════════════════════════
const WEBHOOK = 'https://script.google.com/macros/s/AKfycbzj2Zq3GtWCx_hZ-MduYa3lERAjxyXwztXJJQmnxeF8Z-MUb0eRu2oGEqpfXWR1ca6kBw/exec';

const ETAPAS = ['Interesado a contactar','Enviado al cliente','Presentado','1ra entrevista cliente','2da entrevista cliente','Oferta','Contratado'];
const ETAPAS_EXTRA = ['On hold','Descartado'];
const TODAS_ETAPAS = [...ETAPAS, ...ETAPAS_EXTRA];

const ETAPA_TOP = {
  'Contratado':'border-t-green-500','Oferta':'border-t-amber-500',
  'Descartado':'border-t-red-400','On hold':'border-t-yellow-400',
};

const App = {
  view: 'landing',
  user: null,
  section: 'pipeline',
  data: {
    leads:[], busquedas:[], candidatos:[], kpis:null, config:{},
    busquedaActiva:null, equipoNombres:[], vistaPersona:null, recruiters:[],
  },
  loading: false,
  toast: null,
  modal: null,
  // Scorecard en memoria mientras el usuario edita (antes de guardar)
  scorecardDraft: {},
};

// ═══════════════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════════════
async function apiGet(params) {
  const qs = new URLSearchParams({ ...params, pin: App.user?.pin || '' }).toString();
  const r = await fetch(`${WEBHOOK}?${qs}`, { credentials:'omit', redirect:'follow' });
  return r.json();
}
async function apiPost(body) {
  const r = await fetch(WEBHOOK, {
    method:'POST', credentials:'omit', redirect:'follow',
    headers:{ 'Content-Type':'text/plain' },
    body: JSON.stringify({ ...body, pin: App.user?.pin || '' }),
  });
  return r.json();
}
async function apiPostPublic(body) {
  const r = await fetch(WEBHOOK, {
    method:'POST', credentials:'omit', redirect:'follow',
    headers:{ 'Content-Type':'text/plain' },
    body: JSON.stringify(body),
  });
  return r.json();
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function tryJSON(str, fallback) { try { return JSON.parse(str); } catch { return fallback; } }
function toArr(str) { if (!str) return []; const p = tryJSON(str, null); if (Array.isArray(p)) return p; return String(str).split(/\n|•/).map(s=>s.trim()).filter(Boolean); }
function fmtMoney(n, moneda='') { if (!n && n!==0) return '—'; return (moneda?moneda+' ':'')+Number(n).toLocaleString('es-AR'); }
function normScore(s) { const n=Number(s); if(!n&&n!==0) return null; if(n>10) return Math.round(n/10*10)/10; if(n>0&&n<=1) return Math.round(n*10*10)/10; return n; }
function fmtDate(s) { if(!s) return '—'; return new Date(s).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function badge(t,c) { return `<span class="inline-block px-2 py-0.5 rounded text-xs font-medium ${c}">${t}</span>`; }
function estadoBadge(e) {
  const m={activa:'bg-green-100 text-green-700',pausada:'bg-yellow-100 text-yellow-700',cerrada:'bg-blue-100 text-blue-700',perdida:'bg-red-100 text-red-700',pendiente:'bg-amber-100 text-amber-700',aprobado:'bg-green-100 text-green-700',descartado:'bg-red-100 text-red-700'};
  return badge(e, m[e]||'bg-gray-100 text-gray-700');
}
function prioridadBadge(p) {
  const m={alta:'bg-red-100 text-red-700',media:'bg-yellow-100 text-yellow-700',baja:'bg-slate-100 text-slate-600'};
  return badge(p, m[p]||'bg-gray-100 text-gray-600');
}
function inputCls() { return 'w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900'; }
function selectCls() { return 'w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 bg-white'; }
function generateId(p) { return p+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,6); }

function showToast(msg, type='ok') {
  App.toast = {msg,type}; render();
  setTimeout(()=>{ App.toast=null; render(); },3500);
}
function closeModal() { App.modal=null; App.scorecardDraft={}; App._cvPdfUrl=null; App._cvScore=null; render(); }
function openModal(type, payload) { App.modal={type,payload}; render(); }

// ═══════════════════════════════════════════════════════════════
// AUTH & ROUTING
// ═══════════════════════════════════════════════════════════════
async function doLogin(pin) {
  if (!pin||pin.trim()==='') { showToast('Ingresá el PIN','error'); return; }
  App.loading=true; render();
  try {
    const url=`${WEBHOOK}?action=auth&pin=${encodeURIComponent(pin.trim())}`;
    const r=await fetch(url,{credentials:'omit',redirect:'follow'});
    const text=await r.text();
    let j; try { j=JSON.parse(text); } catch(pe) { showToast('Respuesta inválida: '+text.slice(0,60),'error'); App.loading=false; render(); return; }
    if (j.status==='ok') {
      App.user={...j.data,pin:pin.trim()};
      // Load recruiters list once at login
      apiGet({action:'recruiters'}).then(r=>{ App.data.recruiters=r.data||[]; });
      navigate('panel','pipeline');
    }
    else { showToast('PIN incorrecto','error'); App.loading=false; render(); }
  } catch(e) { showToast('Error de red: '+e.message,'error'); App.loading=false; render(); }
}
function doLogout() {
  App.user=null;
  App.data={leads:[],busquedas:[],candidatos:[],kpis:null,config:{},busquedaActiva:null,equipoNombres:[],vistaPersona:null,recruiters:[]};
  navigate('landing');
}
function navigate(view, section) {
  App.view=view; if(section) App.section=section; render();
  if(view==='panel') loadSection(App.section);
}
async function loadSection(section) {
  App.section=section; App.loading=true; render();
  try {
    const rd = await apiPost({action:'get_data', data:{}});
    App.data.busquedas = rd.data?.busquedas || [];
    App.data.candidatos = rd.data?.candidatos || [];
    if (!App.data.busquedaActiva && App.data.busquedas.length) App.data.busquedaActiva=App.data.busquedas[0].id;
  } catch(e) { showToast('Error cargando datos: '+e.message,'error'); }
  App.loading=false; render();
}

// ═══════════════════════════════════════════════════════════════
// RENDER ROOT
// ═══════════════════════════════════════════════════════════════
function render() {
  let html='';
  if (App.toast) {
    const tc=App.toast.type==='error'?'bg-red-600':'bg-gray-900';
    html+=`<div class="fixed top-4 right-4 z-50 ${tc} text-white px-4 py-3 rounded-lg shadow-lg text-sm fade-in max-w-xs">${App.toast.msg}</div>`;
  }
  if (App.modal) html+=renderModal();
  if (App.view==='landing') html+=renderLanding();
  else if (App.view==='login') html+=renderLogin();
  else if (App.view==='panel') html+=renderPanel();
  document.getElementById('root').innerHTML=html;
  attachEvents();
}

// ═══════════════════════════════════════════════════════════════
// LANDING
// ═══════════════════════════════════════════════════════════════

      <button onclick="navigate('login')" class="text-sm bg-white text-gray-900 px-4 py-2 rounded-lg font-semibold hover:bg-gray-100 transition">Acceso privado</button>
    </header>

    <section class="bg-gray-900 text-white px-6 pt-16 pb-20 md:pt-24 md:pb-28">
      <div class="max-w-3xl mx-auto flex flex-col md:flex-row items-center gap-10">

          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-16 h-16"><path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM3.751 20.105a8.25 8.25 0 0116.498 0 .75.75 0 01-.437.695A18.683 18.683 0 0112 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 01-.437-.695z" clip-rule="evenodd"/></svg>
        </div>

          <h1 class="text-3xl md:text-4xl font-extrabold leading-tight mb-3">Agustín González Benegas</h1>

      </div>
    </section>

      <div class="max-w-3xl mx-auto">
        <h2 class="text-2xl font-bold mb-8 text-gray-900">Cómo trabajo</h2>
        <div class="grid md:grid-cols-2 gap-6">
          ${[['🎯','Entendimiento profundo','Me siento con vos a entender el rol antes de arrancar — no mando perfiles a ciegas.'],['⚡','Velocidad sin sacrificar calidad','Proceso ágil y comunicación constante. Sabés en todo momento cómo está la búsqueda.'],['🤝','Trato directo','Hablás conmigo, no con un equipo de coordinadores. Una sola persona de punta a punta.'],['✅','Garantía de reposición','Si el candidato no supera el período de prueba, repongo sin costo adicional.']].map(([i,t,d])=>`
            <div class="flex gap-4 p-5 rounded-xl border border-gray-100 bg-gray-50">
              <span class="text-2xl">${i}</span>

    <section class="px-6 py-16 bg-gray-50" id="contacto">

          <div class="grid md:grid-cols-2 gap-5">

            <div><label class="block text-sm font-medium text-gray-700 mb-1">Tu nombre *</label><input name="contacto_nombre" required class="${inputCls()}"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Email *</label><input name="contacto_email" type="email" required class="${inputCls()}"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label><input name="contacto_telefono" class="${inputCls()}"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Puesto a cubrir *</label><input name="puesto" required class="${inputCls()}"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Seniority</label>
              <select name="seniority" class="${selectCls()}"><option value="">Seleccioná</option><option>Junior</option><option>Semi-senior</option><option>Senior</option><option>Lead</option><option>Manager</option><option>Director</option></select>

// ═══════════════════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════════════════
function renderLogin() {
  return `
  <div class="min-h-screen bg-gray-900 flex flex-col items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-xs">
      <div class="text-center mb-6">
        <div class="w-12 h-12 bg-gray-900 rounded-xl flex items-center justify-center mx-auto mb-3">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        </div>
        <h2 class="text-xl font-bold text-gray-900">Acceso privado</h2>
        <p class="text-gray-400 text-sm mt-1">Ingresá tu PIN</p>
      </div>
      <input id="pinInput" type="password" inputmode="numeric" maxlength="6"
        class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-center text-2xl tracking-widest focus:outline-none focus:border-gray-900 font-mono"
        placeholder="••••" onkeydown="if(event.key==='Enter') doLogin(this.value)">
      <button onclick="doLogin(document.getElementById('pinInput').value)"
        class="w-full mt-4 bg-gray-900 text-white py-3 rounded-xl font-semibold hover:bg-gray-700 transition">
        ${App.loading ? 'Verificando...' : 'Entrar'}
      </button>
      <button onclick="navigate('landing')" class="w-full mt-3 text-gray-400 text-sm hover:text-gray-600">← Volver</button>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// PANEL SHELL
// ═══════════════════════════════════════════════════════════════
function renderPanel() {
  const isAdmin=App.user?.rol==='admin';
  const sections=[
    {id:'dashboard',label:'Dashboard',icon:'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6'},
    ...(isAdmin?[{id:'leads',label:'Leads',icon:'M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4'}]:[]),
    {id:'busquedas',label:'Búsquedas',icon:'M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z'},
    {id:'pipeline',label:'Pipeline',icon:'M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2'},
    {id:'kpis',label:'KPIs',icon:'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z'},
    {id:'ingresos',label:'Ingresos',icon:'M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z'},
    {id:'historial',label:'Historial',icon:'M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z'},
  ];
  const leadsCount=isAdmin?App.data.leads.filter(l=>l.estado==='pendiente').length:0;
  return `
  <div class="min-h-screen flex flex-col">
    <header class="bg-gray-900 text-white px-4 py-3 flex items-center justify-between sticky top-0 z-30">
      <span class="font-bold text-sm tracking-tight">KBGB Recruiting</span>
      <div class="flex items-center gap-3">
        <span class="text-xs text-gray-400">${App.user?.nombre||'—'} · ${App.user?.rol||'recruiter'}</span>
        <button onclick="doLogout()" class="text-xs text-gray-400 hover:text-white transition">Salir</button>
      </div>
    </header>
    <div class="flex flex-1">
      <nav class="hidden md:flex flex-col w-52 bg-gray-50 border-r border-gray-200 py-4 gap-1 px-2 sticky top-12 h-[calc(100vh-48px)]">
        ${sections.map(s=>`
          <button onclick="loadSection('${s.id}')" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition text-left ${App.section===s.id?'bg-gray-900 text-white':'text-gray-600 hover:bg-gray-200'}">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${s.icon}"/></svg>
            ${s.label}
            ${s.id==='leads'&&leadsCount>0?`<span class="ml-auto bg-amber-500 text-white text-xs px-1.5 py-0.5 rounded-full">${leadsCount}</span>`:''}
          </button>`).join('')}
      </nav>
      <main class="flex-1 overflow-auto">
        ${App.loading?`<div class="flex items-center justify-center py-24 text-gray-400 text-sm">Cargando...</div>`:renderSection()}
      </main>
    </div>
    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex z-30">
      ${sections.map(s=>`
        <button onclick="loadSection('${s.id}')" class="flex-1 flex flex-col items-center py-2 gap-0.5 ${App.section===s.id?'text-gray-900':'text-gray-400'}">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${s.icon}"/></svg>
          <span class="text-[10px]">${s.label}</span>
        </button>`).join('')}
    </nav>
  </div>`;
}

function renderSection() {
  switch(App.section) {
    case 'dashboard':  return renderDashboard();
    case 'leads':      return renderLeads();
    case 'busquedas':  return renderBusquedas();
    case 'pipeline':   return renderPipeline();
    case 'kpis':       return renderKpis();
    case 'ingresos':   return renderIngresos();
    case 'historial':  return renderHistorial();
    default:           return '<div class="p-8 text-gray-400">Sección no encontrada</div>';
  }
}

// ═══════════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════════
function renderDashboard() {
  const k=App.data.kpis, b=App.data.busquedas, isAdmin=App.user.rol==='admin';
  if (!k) return `<div class="p-6 text-gray-400 text-sm">Sin datos</div>`;
  const sinActividad=k.sin_actividad_7dias||[];
  return `
  <div class="p-6 max-w-4xl">
    <div class="flex items-start justify-between mb-6 flex-wrap gap-3">
      <h2 class="text-xl font-bold">Dashboard</h2>
      ${isAdmin?selectorEquipoHTML():''}
    </div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      ${statCard('Búsquedas activas',k.busquedas_activas??'—','text-indigo-600')}
      ${statCard('Contratados (mes)',k.contratados_mes??'—','text-green-600')}
      ${statCard('Revenue del mes',k.ingreso_cobrado_mes!=null?fmtMoney(k.ingreso_cobrado_mes):'—','text-gray-900')}

function renderKanbanCol(etapa, candidatos, bid, busqueda, todas) {
  const topColor=ETAPA_TOP[etapa]||'border-t-indigo-400';
  return `
  <div class="kanban-col w-52 bg-gray-50 rounded-xl border border-gray-200 border-t-2 ${topColor} p-3"
    ondragover="event.preventDefault();this.classList.add('drag-over')"
    ondragleave="this.classList.remove('drag-over')"
    ondrop="dropCandidato(event,'${etapa}','${bid}');this.classList.remove('drag-over')">
    <div class="flex items-center justify-between mb-3">
      <p class="text-xs font-semibold text-gray-700 leading-tight">${etapa}</p>
      <span class="text-xs bg-white border border-gray-200 text-gray-500 px-1.5 py-0.5 rounded-full">${candidatos.length}</span>
    </div>
    <div class="space-y-2">
      ${candidatos.map(c=>{
        const b=todas?App.data.busquedas.find(x=>x.id===c.busqueda_id)||{}:busqueda;
        const mustHaves=tryJSON(b?.must_haves,[]);
        const sc=tryJSON(c.scorecard,{});
        const dots=mustHaves.length?`<div class="flex gap-1 mt-2 flex-wrap">${mustHaves.map(mh=>{
          const v=sc[mh];
          const col=v==='si'?'bg-green-400':v==='no'?'bg-red-400':v==='quizas'?'bg-yellow-400':'bg-gray-200';
          return `<span class="w-2 h-2 rounded-full ${col} inline-block" title="${mh}: ${v||'sin evaluar'}"></span>`;
        }).join('')}</div>`:'';
        const siCount=Object.values(sc).filter(v=>v==='si').length;
        return `
        <div class="bg-white rounded-lg p-3 border border-gray-200 shadow-sm hover:shadow-md transition select-none"
          draggable="true"
          ondragstart="dragStart(event,'${c.id}','${c.busqueda_id}')"
          ondragend="this.classList.remove('dragging')"
          onclick="openModal('ver_candidato','${c.id}')"
          style="cursor:grab">
          ${todas?`<p class="text-xs text-indigo-500 font-medium mb-1 truncate">${b.cliente||''} · ${b.puesto||''}</p>`:''}
          <p class="text-sm font-semibold text-gray-900 leading-tight">${c.nombre}</p>
          ${c.contacto_email?`<p class="text-xs text-gray-400 truncate">${c.contacto_email}</p>`:''}
          ${(()=>{const dias=c.fecha_etapa_actual?Math.floor((Date.now()-new Date(c.fecha_etapa_actual))/(1000*60*60*24)):null;return dias!==null&&dias>5&&c.etapa!=='Descartado'&&c.etapa!=='Contratado'?`<p class="text-xs text-orange-500 font-medium mt-1">⚠ ${dias}d sin movimiento</p>`:`<p class="text-xs text-gray-300 mt-1">${fmtDate(c.fecha_etapa_actual)}</p>`;})()}
          ${c.cv_score?`<div class="flex items-center gap-1.5 mt-1.5">
            <span class="text-xs font-bold px-2 py-0.5 rounded-full ${normScore(c.cv_score)>=7?'bg-green-100 text-green-700':normScore(c.cv_score)>=5?'bg-yellow-100 text-yellow-700':'bg-red-100 text-red-600'}">
              IA ${normScore(c.cv_score)}/10
            </span>
          </div>`:''}
          ${c.expectativa_salarial?`<p class="text-xs text-gray-400 mt-1">💰 ${c.expectativa_salarial}</p>`:''}
          ${dots}
          ${mustHaves.length?`<p class="text-xs text-gray-400 mt-1">${siCount}/${mustHaves.length} must-haves ✓</p>`:''}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

let _dragId=null, _dragBid=null;
function dragStart(e,id,bid) { _dragId=id; _dragBid=bid; e.target.classList.add('dragging'); }
async function dropCandidato(e,etapa,bid) {
  e.preventDefault(); if(!_dragId) return;
  const dragId=_dragId, dragBid=_dragBid;
  _dragId=null; _dragBid=null;
  const c=App.data.candidatos.find(x=>x.id===dragId);
  const prevEtapa=c?.etapa;
  const hoy=new Date().toISOString().slice(0,10);
  if(c){
    c.etapa=etapa;c.fecha_etapa_actual=hoy;
    const hist=tryJSON(c.historial_etapas,[]); hist.push({etapa,fecha:hoy});
    c.historial_etapas=JSON.stringify(hist);
  }
  render();
  const r=await apiPost({action:'mover_candidato',data:{candidato_id:dragId,busqueda_id:dragBid||bid,nueva_etapa:etapa,historial_etapas:c?.historial_etapas||''}});
  if(r.status!=='ok'){
    if(c)c.etapa=prevEtapa; render(); showToast(r.message||'Error','error');
  } else if(etapa==='Contratado') {
    const busqId=dragBid||bid;
    const b=App.data.busquedas.find(x=>x.id===busqId);
    const vacantes=Number(b?.vacantes)||1;
    const contratados=App.data.candidatos.filter(x=>x.busqueda_id===busqId&&x.etapa==='Contratado').length;
    if(b && b.estado!=='cerrada' && contratados<=vacantes) {
      openModal('placement', dragId);
    }
  }
}

function calcFeeClient(b) {
  if(b.fee_tipo==='fijo') return Number(b.fee_valor)||0;
  if(b.fee_tipo==='%') return (Number(b.fee_base)||0)*(Number(b.fee_valor)||0)/100;
  return 0;
}

// Probabilidad por etapa × exclusividad
const PROB_ETAPA = {'Interesado a contactar':0.05,'En proceso de contacto':0.08,'Presentado':0.15,'Enviado al cliente':0.22,'1ra entrevista cliente':0.40,'2da entrevista cliente':0.65,'Oferta':0.88,'Contratado':1};
function calcPipelineProb(busquedas, candidatos) {
  // Por cada búsqueda activa con fee, suma fee × prob_etapa × factor_exclusividad
  let total=0;
  const excl_factor = {'exclusiva':1,'compartida':0.35};
  busquedas.filter(b=>b.estado==='activa').forEach(b=>{
    const fee=calcFeeClient(b); if(!fee) return;
    const fx=excl_factor[b.exclusividad||'exclusiva']||1;
    const cands=candidatos.filter(c=>c.busqueda_id===b.id&&c.etapa!=='Descartado');
    if(!cands.length){ total+=fee*0.05*fx; return; }
    // Usar el candidato más avanzado por búsqueda
    const maxProb=Math.max(...cands.map(c=>PROB_ETAPA[c.etapa]||0.05));
    total+=fee*maxProb*fx;
  });
  return Math.round(total);
}

function renderIngresos() {

  const feeKey=isAdmin?'fee_cabeza':'fee_recruiter';

  const pipelineTotal=activas.reduce((t,b)=>t+calcFeeClient(b),0);
  const pipelineProb=calcPipelineProb(activas,candidatos);
  const sinFees=isAdmin?placements.filter(b=>!Number(b.fee_calculado)):[];

    const prob=maxEtapa?PROB_ETAPA[maxEtapa.etapa]||0.05:0.05;

  // Histórico mensual (últimos 6 meses)

            <p class="text-xs text-gray-400" style="font-size:9px">${m.label}</p>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- Proyección por búsqueda activa -->
    ${proyPorBusqueda.length?`

function renderModal() {
  if(!App.modal) return '';
  const {type,payload}=App.modal;
  let content='';
  try {
    if(type==='nueva_busqueda')  content=modalNuevaBusqueda(payload);
    else if(type==='editar_busqueda') content=modalEditarBusqueda(payload);
    else if(type==='nuevo_candidato') content=modalNuevoCandidato(payload);
    else if(type==='ver_candidato')   content=modalVerCandidato(payload);
    else if(type==='editar_candidato') content=modalEditarCandidato(payload);
    else if(type==='briefing')   content=modalBriefing(payload);
    else if(type==='parsear_jd') content=modalParsearJD(payload);
    else if(type==='confirmar_eliminar_busqueda') content=modalConfirmarEliminarBusqueda(payload);
    else if(type==='placement') content=modalPlacement(payload);
    else if(type==='cerrar_busqueda') content=modalCerrarBusqueda(payload);
    else if(type==='completar_fees') content=modalCompletarFees(payload);
    else if(type==='sourcing_ia') content=modalSourcingIA(payload);
    else if(type==='resumen_pipeline') content=modalResumenPipeline(payload);
    else if(type==='ficha_entrevista') content=modalFichaEntrevista(payload);
    else if(type==='template_mensaje') content=modalTemplateMensaje(payload);
  } catch(err) {
    content=`<div class="p-6"><div class="flex items-center justify-between mb-4"><h3 class="text-lg font-bold text-red-600">Error al abrir</h3><button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">×</button></div><p class="text-sm text-gray-600 bg-red-50 rounded-lg p-3">${err.message}</p></div>`;
  }
  return `
  <div class="fixed inset-0 z-40 flex items-end md:items-center justify-center px-0 md:px-4">
    <div class="absolute inset-0 bg-black/40" onclick="closeModal()"></div>
    <div class="relative bg-white rounded-t-2xl md:rounded-2xl shadow-2xl w-full md:max-w-lg max-h-[90vh] overflow-y-auto fade-in">
      ${content}
    </div>
  </div>`;
}

async function submitBriefing(e,bid) {
  e.preventDefault();
  const fd=new FormData(e.target);
  const d=Object.fromEntries(fd.entries());
  const updates={
    id:bid,
    contexto:d.contexto,
    dia_a_dia:d.dia_a_dia,
    must_haves:JSON.stringify(d.must_haves.split('\n').map(s=>s.trim()).filter(Boolean)),
    nice_to_haves:JSON.stringify(d.nice_to_haves.split('\n').map(s=>s.trim()).filter(Boolean)),
    red_flags:JSON.stringify(d.red_flags.split('\n').map(s=>s.trim()).filter(Boolean)),
    proceso_cliente:d.proceso_cliente,
    criterio_si:d.criterio_si,
    notas_alineamiento:d.notas_alineamiento||'',
    moneda:d.moneda||'ARS',
    banda_salarial_min:d.banda_salarial_min||'',
    banda_salarial_max:d.banda_salarial_max||'',
  };
  const r=await apiPost({action:'editar_busqueda',data:updates});
  if(r.status==='ok'){
    const b=App.data.busquedas.find(x=>x.id===bid);
    if(b) Object.assign(b,updates);
    App._parsedBriefing=null; showToast('Briefing guardado ✓'); closeModal();
  } else showToast(r.message||'Error','error');
}

async function ejecutarParseJD(bid) {
  const jdText=document.getElementById('jdText')?.value?.trim();
  const notasText=document.getElementById('notasText')?.value?.trim();
  if(!jdText && !notasText){showToast('Pegá la JD o las notas de alineamiento','error');return;}
  const btn=document.getElementById('parseBtn');
  if(btn){btn.disabled=true;btn.textContent='Procesando con IA...';}
  try {
    // Guardar textos en el sheet
    const saves={id:bid};
    if(jdText) saves.jd_texto=jdText;
    if(notasText) saves.notas_alineamiento=notasText;
    if(Object.keys(saves).length>1) {
      await apiPost({action:'editar_busqueda',data:saves});
      const b=App.data.busquedas.find(x=>x.id===bid);
      if(b) Object.assign(b,saves);
    }
    const r=await apiPost({action:'parsear_jd',data:{jd_text:jdText||'',notas_text:notasText||'',busqueda_id:bid}});
    if(r.status==='ok'){
      App._parsedBriefing=r.data;
      App.modal={type:'briefing',payload:bid};
      render();
      showToast('Briefing pre-llenado — revisá y guardá ✓');
    } else {
      showToast(r.message||'Error al parsear','error');
      if(btn){btn.disabled=false;btn.textContent='✨ Parsear con IA';}
    }
  } catch(e) { showToast('Error: '+e.message,'error'); if(btn){btn.disabled=false;btn.textContent='✨ Parsear con IA';} }
}

// PDF DE JD → PIPELINE (subir desde modal Parsear JD)
// ═══════════════════════════════════════════════════════════════
function handleJDPdfDrop(e, bid) {
  e.preventDefault();
  document.getElementById('jdPdfDropZone')?.classList.remove('border-indigo-400','bg-indigo-50');
  const file=e.dataTransfer?.files?.[0];
  if(file && file.type==='application/pdf') handleJDPdfFile(file, bid);
  else showToast('Solo se aceptan archivos PDF','error');
}

async function handleJDPdfFile(file, bid) {
  if(!file) return;
  const statusEl=document.getElementById('jdPdfStatus');
  const dropZone=document.getElementById('jdPdfDropZone');
  if(statusEl){statusEl.classList.remove('hidden');statusEl.textContent='📄 Leyendo PDF...';}
  if(dropZone) dropZone.classList.add('opacity-40','pointer-events-none');
  try {
    if(typeof pdfjsLib==='undefined') throw new Error('pdf.js no cargó — revisá tu conexión');
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const arrayBuffer=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:arrayBuffer}).promise;
    let text='';
    for(let i=1;i<=pdf.numPages;i++){
      const page=await pdf.getPage(i);
      const content=await page.getTextContent();
      text+=content.items.map(item=>item.str).join(' ')+'\n';
    }
    if(statusEl) statusEl.textContent='☁️ Subiendo PDF a Drive...';
    // Subir a Drive
    const base64=await new Promise(res=>{
      const reader=new FileReader();
      reader.onload=()=>res(reader.result.split(',')[1]);
      reader.readAsDataURL(file);
    });
    const r=await apiPost({action:'guardar_jd_pdf',data:{filename:file.name,base64data:base64,busqueda_id:bid}});
    if(r.status!=='ok') throw new Error(r.message||'Error al subir PDF');
    const url=r.data.url;
    // Actualizar en memoria y en el textarea de texto
    const b=App.data.busquedas.find(x=>x.id===bid);
    if(b){
      b.jd_pdf_url=url;
      if(text.trim()) b.jd_texto=text.trim();
    }
    // Pre-llenar el textarea de texto de la JD
    const jdTextArea=document.getElementById('jdText');
    if(jdTextArea && text.trim()) jdTextArea.value=text.trim();
    // Actualizar la zona de drop
    if(dropZone){
      dropZone.classList.remove('opacity-40','pointer-events-none');
      dropZone.className=dropZone.className.replace('border-gray-200','border-green-300 bg-green-50');
      dropZone.innerHTML=`<p class="text-xs text-green-700 font-medium">✅ PDF guardado — <a href="${url}" target="_blank" onclick="event.stopPropagation()" class="underline hover:text-green-900">Ver / descargar</a></p><p class="text-xs text-gray-400 mt-0.5">Hacé clic o arrastrá para reemplazarlo</p>`;
    }
    if(statusEl) statusEl.classList.add('hidden');
    showToast('PDF guardado en Drive ✓');
  } catch(err){
    showToast(err.message,'error');
    if(statusEl){statusEl.textContent='❌ '+err.message;statusEl.classList.add('text-red-500');}
    if(dropZone) dropZone.classList.remove('opacity-40','pointer-events-none');
  }
}

// ═══════════════════════════════════════════════════════════════
// PDF → PARSEAR JD → PRE-LLENAR FORMULARIO
// ═══════════════════════════════════════════════════════════════
function handleJDDrop(e) {
  e.preventDefault();
  document.getElementById('jdDropZone')?.classList.remove('border-indigo-400','bg-indigo-50');
  const file = e.dataTransfer?.files?.[0];
  if (file && file.type === 'application/pdf') handleJDFile(file);
  else showToast('Solo se aceptan archivos PDF', 'error');
}

async function handleJDFile(file) {
  if (!file) return;
  const statusEl = document.getElementById('jdParseStatus');
  const dropZone = document.getElementById('jdDropZone');
  if (statusEl) { statusEl.classList.remove('hidden'); statusEl.textContent = '📄 Leyendo PDF...'; }
  if (dropZone) dropZone.classList.add('opacity-40', 'pointer-events-none');

  try {
    // Extraer texto del PDF con pdf.js
    if (typeof pdfjsLib === 'undefined') throw new Error('pdf.js no cargó — revisá tu conexión a internet');
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let text = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join(' ') + '\n';
    }

    if (!text.trim()) throw new Error('El PDF no tiene texto extraíble (puede ser una imagen escaneada)');

    if (statusEl) statusEl.textContent = '☁️ Guardando PDF en Drive...';

    // Guardar PDF en Google Drive
    const busquedaId = document.getElementById('busquedaForm')?.querySelector('[name="_busqueda_id"]')?.value || '';
    const base64 = await new Promise(res => {
      const reader = new FileReader();
      reader.onload = () => res(reader.result.split(',')[1]);
      reader.readAsDataURL(file);
    });
    const pdfR = await apiPost({ action: 'guardar_pdf', data: { filename: file.name, base64data: base64, busqueda_id: busquedaId } });
    if (pdfR.status === 'ok') {
      const hiddenPdf = document.getElementById('busquedaForm')?.querySelector('[name="jd_pdf_url"]');
      if (hiddenPdf) hiddenPdf.value = pdfR.data.url;
    }

    if (statusEl) statusEl.textContent = '✨ Analizando con IA...';

    // Llamar al Apps Script
    const r = await apiPost({ action: 'parsear_jd', data: { jd_text: text, jd_texto: text } });
    if (r.status !== 'ok') throw new Error(r.message || 'Error al parsear');

    const p = r.data;

    // Pre-llenar campos del formulario
    const f = document.getElementById('busquedaForm');
    if (!f) return;

    const set = (name, val) => { if (!val && val !== 0) return; const el = f.querySelector(`[name="${name}"]`); if (el) el.value = val; };
    const setSelect = (name, val) => {
      if (!val) return;
      const el = f.querySelector(`[name="${name}"]`);
      if (!el) return;
      const opt = [...el.options].find(o => o.value.toLowerCase() === String(val).toLowerCase());
      if (opt) el.value = opt.value;
    };

    set('cliente',            p.cliente);
    set('puesto',             p.puesto);
    set('banda_salarial_min', p.banda_salarial_min);
    set('banda_salarial_max', p.banda_salarial_max);
    setSelect('seniority',    p.seniority);
    setSelect('modalidad',    p.modalidad);
    setSelect('moneda',       p.moneda);

    // Guardar briefing en campo oculto para enviarlo junto con la búsqueda
    const briefing = {
      contexto:       p.contexto       || '',
      dia_a_dia:      p.dia_a_dia      || '',
      must_haves:     JSON.stringify(p.must_haves    || []),
      nice_to_haves:  JSON.stringify(p.nice_to_haves || []),
      red_flags:      JSON.stringify(p.red_flags     || []),
      proceso_cliente:p.proceso_cliente || '',
      criterio_si:    p.criterio_si    || '',
    };
    const briefingInput = f.querySelector('[name="_briefing"]');
    if (briefingInput) briefingInput.value = JSON.stringify(briefing);

    if (statusEl) {
      statusEl.textContent = '✅ Formulario pre-llenado — revisá y completá lo que falta (fee, recruiter)';
      statusEl.classList.add('text-green-600');
      statusEl.classList.remove('text-indigo-600');
    }
    if (dropZone) { dropZone.classList.remove('opacity-40','pointer-events-none'); dropZone.classList.add('hidden'); }

  } catch(err) {
    showToast(err.message, 'error');
    if (statusEl) { statusEl.textContent = '❌ ' + err.message; statusEl.classList.add('text-red-500'); }
    if (dropZone) dropZone.classList.remove('opacity-40','pointer-events-none');
  }
}

// MODAL — CANDIDATOS (con scorecard)

function renderScorecard(busquedaId, existingScorecard) {
  const b=App.data.busquedas.find(x=>x.id===busquedaId)||{};
  const mustHaves=tryJSON(b.must_haves,[]);
  const niceToHaves=tryJSON(b.nice_to_haves,[]);
  const redFlags=tryJSON(b.red_flags,[]);
  const allItems=[
    ...mustHaves.map(x=>({label:x,tipo:'must'})),
    ...niceToHaves.map(x=>({label:x,tipo:'nice'})),
    ...redFlags.map(x=>({label:x,tipo:'flag'}))
  ];
  if(!allItems.length) return '';
  const sc=existingScorecard||{};
  const tipoLabel={'must':'✅ Must-have','nice':'⭐ Nice to have','flag':'🚩 Red flag'};
  let lastTipo='';
  return `
  <div class="border border-gray-200 rounded-xl overflow-hidden">
    <div class="bg-gray-50 px-4 py-2.5 border-b border-gray-100">
      <p class="text-xs font-semibold text-gray-700">Scorecard</p>
    </div>
    <div class="divide-y divide-gray-100">
      ${allItems.map((item)=>{
        const val=sc[item.label]||'';
        const header=item.tipo!==lastTipo?(lastTipo=item.tipo,`<div class="px-4 py-1.5 bg-gray-50 border-b border-gray-100"><p class="text-xs font-semibold text-gray-400">${tipoLabel[item.tipo]}</p></div>`):'';
        return `${header}
        <div class="flex items-center justify-between px-4 py-2.5 gap-3">
          <p class="text-xs text-gray-700 flex-1">${item.label}</p>
          <div class="flex gap-1 flex-shrink-0">
            <button type="button" onclick="setScore(this,'${item.label.replace(/'/g,"\\'")}','si')" class="score-btn ${val==='si'?'active-si':''} text-xs px-2.5 py-1 rounded-lg border border-gray-200 hover:bg-green-50">✓ Sí</button>
            <button type="button" onclick="setScore(this,'${item.label.replace(/'/g,"\\'")}','quizas')" class="score-btn ${val==='quizas'?'active-q':''} text-xs px-2.5 py-1 rounded-lg border border-gray-200 hover:bg-yellow-50">? Quizás</button>
            <button type="button" onclick="setScore(this,'${item.label.replace(/'/g,"\\'")}','no')" class="score-btn ${val==='no'?'active-no':''} text-xs px-2.5 py-1 rounded-lg border border-gray-200 hover:bg-red-50">✗ No</button>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>
  <input type="hidden" name="scorecard" id="scorecardInput" value='${JSON.stringify(sc).replace(/'/g,"&#39;")}'>`;
}

function setScore(btn, key, val) {
  // Toggle: si ya está activo, deseleccionar
  const isActive=(val==='si'&&btn.classList.contains('active-si'))||(val==='no'&&btn.classList.contains('active-no'))||(val==='quizas'&&btn.classList.contains('active-q'));
  const actualVal=isActive?'':val;

  // Actualizar draft en memoria
  if(!App.scorecardDraft) App.scorecardDraft={};
  App.scorecardDraft[key]=actualVal;

  // Actualizar hidden input
  const input=document.getElementById('scorecardInput');
  if(input) {
    const current=tryJSON(input.value,{});
    current[key]=actualVal;
    input.value=JSON.stringify(current);
  }

  // Actualizar estilos de los 3 botones de esa fila
  const row=btn.closest('.flex');
  row.querySelectorAll('.score-btn').forEach(b=>b.classList.remove('active-si','active-no','active-q'));
  if(actualVal==='si') btn.classList.add('active-si');
  else if(actualVal==='no') btn.classList.add('active-no');
  else if(actualVal==='quizas') btn.classList.add('active-q');
}

function handleCVDrop(e, formId) {
  e.preventDefault();
  document.getElementById('cvDropZone')?.classList.remove('border-indigo-400','bg-indigo-50');

  if(file && file.type==='application/pdf') handleCVFile(file, formId);
  else showToast('Solo se aceptan archivos PDF','error');
}

async function handleCVFile(file, formId) {
  if(!file) return;
  const statusEl=document.getElementById('cvStatus');
  const dropZone=document.getElementById('cvDropZone');
  if(statusEl){statusEl.classList.remove('hidden');statusEl.textContent='📄 Leyendo CV...';}
  if(dropZone) dropZone.classList.add('opacity-40','pointer-events-none');
  try {
    if(typeof pdfjsLib==='undefined') throw new Error('pdf.js no cargó');
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // Leer como base64 para subir a Drive
    const base64=await new Promise((res,rej)=>{
      const reader=new FileReader();
      reader.onload=e=>res(e.target.result.split(',')[1]);
      reader.onerror=rej;
      reader.readAsDataURL(file);
    });

    // Extraer texto con pdf.js
    const arrayBuffer=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:new Uint8Array(arrayBuffer)}).promise;
    let text='';
    for(let i=1;i<=pdf.numPages;i++){
      const page=await pdf.getPage(i);
      const content=await page.getTextContent();
      text+=content.items.map(item=>item.str).join(' ')+'\n';
    }
    if(!text.trim()) throw new Error('El PDF no tiene texto extraíble');

    if(statusEl) statusEl.textContent='✨ Subiendo a Drive y procesando con IA...';
    // Get búsqueda context for scoring
    const busquedaId=App.modal?.payload?.busqueda_id||App.data.busquedaActiva;
    const busqueda=App.data.busquedas?.find(x=>x.id===busquedaId)||{};
    const r=await apiPost({action:'parsear_y_guardar_cv',data:{
      cv_text:text, base64data:base64, filename:file.name,
      // Pass briefing for scoring
      puesto:busqueda.puesto||'', cliente:busqueda.cliente||'',
      must_haves:busqueda.must_haves||'', nice_to_haves:busqueda.nice_to_haves||'',
      red_flags:busqueda.red_flags||'', criterio_si:busqueda.criterio_si||'',
      descripcion:busqueda.descripcion||busqueda.contexto||'',
    }});
    if(r.status!=='ok') throw new Error(r.message||'Error al procesar');


    const {url,score,score_justificacion,score_pros,score_contras,...p}=r.data;
    App._parsedCV=p;
    App._cvPdfUrl=url;
    App._cvScore={score,justificacion:score_justificacion,pros:score_pros,contras:score_contras};
    App.modal={...App.modal};
    render();
    const scoreMsg=score?` · Score IA: ${score}/10`:'';
    showToast(p.nombre?`CV guardado: ${p.nombre}${scoreMsg} ✓`:'CV guardado — completá los datos que falten');
  } catch(err) {
    showToast(err.message,'error');
    if(statusEl){statusEl.textContent='❌ '+err.message;statusEl.classList.add('text-red-500');}
    if(dropZone) dropZone.classList.remove('opacity-40','pointer-events-none');
  }
}

async function abrirFichaEntrevista(candidatoId) {
  const c = App.data.candidatos.find(x => x.id === candidatoId);
  const b = App.data.busquedas.find(x => x.id === c?.busqueda_id) || {};
  if (!c) return;
  // Abrir modal con loading
  App.modal = { type: 'ficha_entrevista', payload: { candidatoId, estado: 'loading', ficha: null } };
  render();
  try {
    let mustHaves = b.must_haves || '';
    try { if (mustHaves.startsWith('[')) mustHaves = JSON.parse(mustHaves).join(', '); } catch(e) {}
    const r = await apiPost({ action: 'ficha_entrevista', data: {
      candidato_nombre: c.nombre || '',
      candidato_resumen: c.notas || '',
      cv_score_pros: c.cv_score_pros || '',
      cv_score_contras: c.cv_score_contras || '',
      puesto: b.puesto || '',
      cliente: b.cliente || '',
      seniority: b.seniority || '',
      must_haves: mustHaves,
      nice_to_haves: b.nice_to_haves || '',
      criterio_si: b.criterio_si || '',
      dia_a_dia: b.dia_a_dia || '',
    }});
    if (r.status !== 'ok') throw new Error(r.message);
    App.modal.payload = { candidatoId, estado: 'ok', ficha: r.data };
  } catch(err) {
    App.modal.payload = { candidatoId, estado: 'error', error: err.message };
  }
  render();
}

function descargarCandidatoCSV(id) {
  const c=App.data.candidatos.find(x=>x.id===id);
  if(!c) return;
  const b=App.data.busquedas.find(x=>x.id===c.busqueda_id)||{};
  const campos=[
    ['Nombre',c.nombre||''],['Email',c.contacto_email||''],['Teléfono',c.contacto_telefono||''],
    ['LinkedIn',c.linkedin||''],['Etapa',c.etapa||''],['Empresa',b.cliente||''],
    ['Puesto',b.puesto||''],['Seniority',b.seniority||''],['Recruiter',c.recruiter||''],
    ['Notas',c.notas||''],['Fecha',c.fecha_etapa_actual||''],
  ];
  const csv=campos.map(([k,v])=>`"${k}","${String(v).replace(/"/g,'""')}"`).join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${(c.nombre||'candidato').replace(/\s+/g,'_')}.csv`;
  a.click();
}

// Auto-calc fee from salary when user types salary
function recalcFees(salarioInput, moneda) {
  const sal=Number(salarioInput.value)||0;
  // Try to get fee % from current búsqueda
  const c=App.data.candidatos.find(x=>x.id===App.modal?.payload);
  const b=c?App.data.busquedas.find(x=>x.id===c.busqueda_id):null;
  if(b && b.fee_tipo==='%' && sal>0){
    const fee=sal*(Number(b.fee_valor)||0)/100;
    const feeEl=document.getElementById('feeTotal');
    if(feeEl && !feeEl._manuallyEdited) feeEl.value=Math.round(fee);
  }
}

async function confirmarPlacement(e, candidatoId) {
  e.preventDefault();
  const fd=new FormData(e.target);
  const d=Object.fromEntries(fd.entries());
  const c=App.data.candidatos.find(x=>x.id===candidatoId);
  const b=App.data.busquedas.find(x=>x.id===c?.busqueda_id)||{};
  const vacantes=Number(b.vacantes)||1;
  // Count contratados AFTER this one (optimistically already updated in local state)
  const contratados=App.data.candidatos.filter(x=>x.busqueda_id===b.id&&x.etapa==='Contratado').length;
  const esUltimoPlacement=contratados>=vacantes;
  const r=await apiPost({action:'confirmar_placement',data:{
    candidato_id:candidatoId,
    busqueda_id:c?.busqueda_id,
    candidato_nombre:d.nombre_contratado||c?.nombre,
    candidato_placement_id:candidatoId,
    salario_contratado:d.salario_contratado||0,
    fee_calculado:d.fee_calculado||0,
    fee_recruiter:d.fee_recruiter||0,
    fee_cabeza:isAdmin?(d.fee_cabeza||0):null,
    garantia_dias:d.garantia_dias||90,
    notas_placement:d.notas_placement||'',
    fecha_cierre:d.fecha_cierre,
    fecha_ingreso_contratado:d.fecha_ingreso_contratado||'',
    fecha_cobro_estimada:d.fecha_cobro_estimada||'',
    estado_cobro:'pendiente',
    recruiter_asignado:b.recruiter_asignado||'',
    recruiter_nombre:App.user?.nombre||'',
    cerrar_busqueda:esUltimoPlacement,
    es_admin:isAdmin,
    cliente:b.cliente||'',
    puesto:b.puesto||'',
    moneda:b.moneda||'ARS',
  }});
  if(r.status==='ok'){
    if(esUltimoPlacement && b.id){
      const bLocal=App.data.busquedas.find(x=>x.id===b.id);
      if(bLocal){bLocal.estado='cerrada';bLocal.candidato_placement_id=candidatoId;bLocal.candidato_placement=c?.nombre;}
      showToast(`🎉 ¡Todas las vacantes cubiertas! Búsqueda cerrada.`);
    } else {
      showToast(`✅ Placement ${contratados}/${vacantes} registrado. Quedan ${vacantes-contratados} vacante(s).`);
    }
    closeModal();
    render();
  } else showToast(r.message||'Error','error');
}

async function generarResumenPipeline(bid) {
  const b = App.data.busquedas.find(x => x.id === bid);
  if (!b) return;
  const candidatos = (App.data.candidatos || []).filter(c => c.busqueda_id === bid);
  const r = await apiPost({ action: 'resumen_pipeline', data: {
    puesto: b.puesto, cliente: b.cliente, seniority: b.seniority || '',
    fecha_inicio: b.fecha_creacion || '',
    candidatos: candidatos.map(c => ({
      nombre: c.nombre || 'Sin nombre',
      etapa: c.etapa || 'por_revisar',
      cv_score: c.cv_score || '',
      notas: c.notas || '',
      cv_score_pros: c.cv_score_pros || '',
      cv_score_contras: c.cv_score_contras || '',
    }))
  }});
  const el = document.getElementById('resumenContent');
  if (!el) return;
  if (r.status !== 'ok') {
    el.innerHTML = `<p class="text-red-500 text-sm p-4">${r.message || 'Error generando resumen'}</p>`;
    return;

var _sourcingSaveTimer = null;
function autoSaveSourcing(bid, field, value) {
  const b = App.data.busquedas.find(x => x.id === bid);
  if (!b) return;
  try {
    const cache = b.sourcing_cache ? JSON.parse(b.sourcing_cache) : {};
    cache[field] = value;
    b.sourcing_cache = JSON.stringify(cache);
  } catch(e) {}
  clearTimeout(_sourcingSaveTimer);
  _sourcingSaveTimer = setTimeout(() => {
    apiPost({action:'editar_busqueda', data:{id: bid, sourcing_cache: b.sourcing_cache}});
  }, 1200);
}

async function generarSourcingIA(bid) {
  const b=App.data.busquedas.find(x=>x.id===bid);
  if(!b) return;
  const el=document.getElementById('sourcingContent');
  if(el) el.innerHTML=`<div class="flex flex-col items-center justify-center py-12 text-gray-400"><div class="w-8 h-8 border-2 border-indigo-400 border-t-transparent rounded-full animate-spin mb-3"></div><p class="text-sm">Generando con IA...</p></div>`;
  const r=await apiPost({action:'sourcing_ia',data:{
    puesto:b.puesto, cliente:b.cliente, seniority:b.seniority||'',
    industria:b.industria||'', modalidad:b.modalidad||'',
    ubicacion:b.ubicacion||'Buenos Aires, Argentina',
    must_haves:b.must_haves||'', nice_to_haves:b.nice_to_haves||'',
    descripcion:b.descripcion||b.contexto||'',
  }});
  if(!document.getElementById('sourcingContent')) return;
  if(r.status!=='ok'){
    document.getElementById('sourcingContent').innerHTML=`<p class="text-red-500 text-sm p-4">${r.message||'Error generando sourcing'}</p>`;
    return;
  }
  const s=r.data;
  // Guardar en sheet y en memoria
  b.sourcing_cache = JSON.stringify(s);
  apiPost({action:'editar_busqueda', data:{id: bid, sourcing_cache: b.sourcing_cache}});
  renderSourcingContent(bid, s);
}

// Estado del chat de sourcing
App._sourcingCtx = null; // {bid, sourcing, history}

async function enviarMensajeSourcing(bid) {
  const input = document.getElementById('sourcingChatInput');
  const histEl = document.getElementById('sourcingChatHistory');
  const msg = input?.value?.trim();
  if (!msg || !histEl) return;

  const b = App.data.busquedas.find(x => x.id === bid) || {};
  if (!App._sourcingCtx || App._sourcingCtx.bid !== bid) {
    App._sourcingCtx = { bid, history: [] };
  }

  // Mostrar mensaje del usuario
  input.value = '';
  input.disabled = true;
  histEl.innerHTML += `<div class="flex justify-end"><div class="bg-blue-600 text-white text-xs rounded-2xl rounded-tr-sm px-3 py-2 max-w-[80%]">${msg}</div></div>`;
  histEl.innerHTML += `<div id="sourcingTyping" class="flex justify-start"><div class="bg-gray-100 text-gray-500 text-xs rounded-2xl rounded-tl-sm px-3 py-2">...</div></div>`;
  histEl.scrollTop = histEl.scrollHeight;

  App._sourcingCtx.history.push({ role: 'user', content: msg });

  try {
    const r = await apiPost({ action: 'sourcing_chat', data: {
      puesto: b.puesto, cliente: b.cliente, seniority: b.seniority || '',
      modalidad: b.modalidad || '', must_haves: b.must_haves || '',
      ubicacion: b.ubicacion || 'Buenos Aires, Argentina',
      history: App._sourcingCtx.history,
    }});

    const reply = r.status === 'ok' ? (r.data.respuesta || r.data) : 'Error: ' + (r.message || 'no se pudo responder');
    const updates = (r.status === 'ok' && r.data.updates) ? r.data.updates : {};
    App._sourcingCtx.history.push({ role: 'assistant', content: String(reply) });

    document.getElementById('sourcingTyping')?.remove();
    histEl.innerHTML += `<div class="flex justify-start"><div class="bg-gray-100 text-gray-800 text-xs rounded-2xl rounded-tl-sm px-3 py-2 max-w-[85%] leading-relaxed whitespace-pre-wrap">${String(reply)}</div></div>`;

    // Aplicar updates a los paneles
    if (updates.mensaje_conexion) {
      const el = document.getElementById('msgConexion');
      if (el) { el.value = updates.mensaje_conexion; document.getElementById('msgLen').textContent = updates.mensaje_conexion.length + ' / 300 caracteres'; }
      histEl.innerHTML += `<div class="text-xs text-green-600 px-2 py-0.5">✓ Mensaje de conexión actualizado</div>`;
    }
    if (updates.mensaje_informal) {
      const el = document.getElementById('msgInformal');
      if (el) el.value = updates.mensaje_informal;
    }
    if (updates.followup) {
      const el = document.getElementById('msgFollowup');
      if (el) el.value = updates.followup;
      histEl.innerHTML += `<div class="text-xs text-green-600 px-2 py-0.5">✓ Follow-up actualizado</div>`;
    }
    if (updates.boolean_linkedin) {
      const el = document.getElementById('boolLinkedIn');
      if (el) el.textContent = updates.boolean_linkedin;
      histEl.innerHTML += `<div class="text-xs text-green-600 px-2 py-0.5">✓ Boolean actualizado</div>`;
    }
    if (updates.keywords && updates.keywords.length) {
      const el = document.getElementById('sourcingKeywordsPanel');
      if (el) el.innerHTML = updates.keywords.map(k=>`<span class="bg-white border border-indigo-200 text-indigo-800 text-xs px-2.5 py-1.5 rounded-lg font-medium cursor-pointer hover:bg-indigo-100 transition" onclick="copyText('${k.replace(/'/g,"\\'")}',this)">${k}</span>`).join('');
      histEl.innerHTML += `<div class="text-xs text-green-600 px-2 py-0.5">✓ Keywords actualizadas</div>`;
    }
    if (updates.titulos && updates.titulos.length) {
      const el = document.getElementById('sourcingTitulosPanel');
      if (el) el.innerHTML = updates.titulos.map(t=>`<span class="bg-white border border-blue-200 text-blue-800 text-xs px-2.5 py-1.5 rounded-lg font-medium cursor-pointer hover:bg-blue-100 transition" onclick="copyText('${t.replace(/'/g,"\\'")}',this)">${t}</span>`).join('');
      histEl.innerHTML += `<div class="text-xs text-green-600 px-2 py-0.5">✓ Títulos actualizados</div>`;
    }
    histEl.scrollTop = histEl.scrollHeight;
  } catch(e) {
    document.getElementById('sourcingTyping')?.remove();
    histEl.innerHTML += `<div class="text-xs text-red-500 px-2">${e.message}</div>`;
  }
  input.disabled = false;
  input.focus();
}

// Grabación de audio para chat de sourcing
var _sourcingMediaRecorder = null;
var _sourcingAudioChunks = [];

async function toggleSourcingRecording(bid) {
  const btn = document.getElementById('sourcingMicBtn');
  if (_sourcingMediaRecorder && _sourcingMediaRecorder.state === 'recording') {
    _sourcingMediaRecorder.stop();
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    _sourcingAudioChunks = [];
    _sourcingMediaRecorder = new MediaRecorder(stream);
    _sourcingMediaRecorder.ondataavailable = e => _sourcingAudioChunks.push(e.data);
    _sourcingMediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      if (btn) { btn.textContent = '🎤'; btn.className = 'px-3 py-2 bg-gray-100 text-gray-600 rounded-xl text-sm hover:bg-gray-200 transition'; }
      const blob = new Blob(_sourcingAudioChunks, { type: 'audio/webm' });
      const base64 = await new Promise(res => {
        const reader = new FileReader();
        reader.onload = e => res(e.target.result.split(',')[1]);
        reader.readAsDataURL(blob);
      });
      const input = document.getElementById('sourcingChatInput');
      if (input) { input.value = '🎤 Transcribiendo...'; input.disabled = true; }
      try {
        const r = await apiPost({ action: 'sourcing_transcribir', data: { audio: base64 } });
        if (r.status === 'ok' && r.data.texto) {
          input.value = r.data.texto;
          input.disabled = false;
          enviarMensajeSourcing(bid);
        } else {
          input.value = '';
          input.disabled = false;
          showToast('No se pudo transcribir el audio', 'error');
        }
      } catch(e) {
        if (input) { input.value = ''; input.disabled = false; }
        showToast('Error al transcribir: ' + e.message, 'error');
      }
    };
    _sourcingMediaRecorder.start();
    if (btn) { btn.textContent = '⏹️'; btn.className = 'px-3 py-2 bg-red-100 text-red-600 rounded-xl text-sm hover:bg-red-200 transition'; }
  } catch(e) {
    showToast('No se pudo acceder al micrófono: ' + e.message, 'error');
  }
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(()=>{
    const orig=btn?.textContent;
    if(btn){btn.textContent='✓ Copiado';setTimeout(()=>{btn.textContent=orig;},1500);}
  });
}

async function submitCompletarFees(e, bid) {
  e.preventDefault();
  const fd=new FormData(e.target);
  const d=Object.fromEntries(fd.entries());
  const r=await apiPost({action:'editar_busqueda',data:{id:bid,...d}});
  if(r.status==='ok'){
    const b=App.data.busquedas.find(x=>x.id===bid);
    if(b){Object.assign(b,d);}
    showToast('Fees guardados ✓');
    closeModal();
    render();
  } else showToast(r.message||'Error','error');
}

function getTemplateMensaje(etapa, c, b) {
  const u = App.user?.nombre || '';
  const tmpl = TEMPLATES_BASE[etapa] || TEMPLATES_BASE['Interesado a contactar'];
  const lsKey = 'tmpl_' + etapa;
  const saved = localStorage.getItem(lsKey);
  if (saved) return saved.replace(/\{nombre\}/g, c.nombre?.split(' ')[0]||'').replace(/\{puesto\}/g, b.puesto||'').replace(/\{cliente\}/g, b.cliente||'').replace(/\{recruiter\}/g, u);
  return tmpl.mensaje(c, b, u);
}

function saveTemplateMensaje(etapa, texto, c, b) {
  const u = App.user?.nombre || '';
  const nombre = c.nombre?.split(' ')[0] || '';
  const generico = texto
    .replace(new RegExp(nombre, 'g'), '{nombre}')
    .replace(new RegExp(b.puesto||'XXXXX', 'g'), '{puesto}')
    .replace(new RegExp(b.cliente||'XXXXX', 'g'), '{cliente}')
    .replace(new RegExp(u||'XXXXX', 'g'), '{recruiter}');
  localStorage.setItem('tmpl_' + etapa, generico);
}

async function guardarNotasCandidato(id) {
  const notas=document.getElementById('notasCandidato_'+id)?.value||'';
  const c=App.data.candidatos.find(x=>x.id===id);
  if(!c) return;
  const r=await apiPost({action:'editar_candidato',data:{id,busqueda_id:c.busqueda_id,notas}});
  if(r.status==='ok'){c.notas=notas;showToast('Notas guardadas ✓');}
  else showToast(r.message||'Error','error');
}

async function eliminarCandidato(id) {
  const c=App.data.candidatos.find(x=>x.id===id);
  if(!c) return;
  if(!confirm(`¿Eliminar a ${c.nombre}? Esta acción no se puede deshacer.`)) return;
  const r=await apiPost({action:'eliminar_candidato',data:{id}});
  if(r.status==='ok'){
    App.data.candidatos=App.data.candidatos.filter(x=>x.id!==id);
    closeModal();
    showToast('Candidato eliminado');
    render();
  } else showToast(r.message||'Error al eliminar','error');
}

async function eliminarBusquedaConfirmada(e, id) {
  e.preventDefault();
  const fd=new FormData(e.target);
  const motivo=fd.get('motivo');
  const notas_cierre=fd.get('notas_cierre');
  const r=await apiPost({action:'eliminar_busqueda',data:{id,motivo,notas_cierre}});
  if(r.status==='ok'){
    App.data.busquedas=App.data.busquedas.filter(x=>x.id!==id);
    if(App.data.busquedaActiva===id) App.data.busquedaActiva=App.data.busquedas[0]?.id||null;
    closeModal();
    showToast('Búsqueda eliminada');
    render();
  } else showToast(r.message||'Error al eliminar','error');
}

async function submitBusqueda(e) {
  e.preventDefault();
  const fd=new FormData(e.target);
  const d=Object.fromEntries(fd.entries());
  // Collect multi-checkbox recruiter_asignado
  d.recruiter_asignado=fd.getAll('recruiter_asignado').join(', ');
  const leadId=d.lead_id; delete d.lead_id;
  const briefingRaw=d._briefing; delete d._briefing;
  const briefing=tryJSON(briefingRaw,{});
  const busqueda={...d,...briefing,id:generateId('B')};
  let r;
  if(leadId) r=await apiPost({action:'aprobar_lead',data:{lead_id:leadId,busqueda}});
  else r=await apiPost({action:'nueva_busqueda',data:busqueda});
  if(r.status==='ok'){
    showToast('Búsqueda creada ✓');
    closeModal();
    // Si vino con briefing del PDF, ir directo al pipeline
    if(briefingRaw) { App.data.busquedaActiva=busqueda.id; await loadSection('pipeline'); }
    else await loadSection(leadId?'leads':'busquedas');
  } else showToast(r.message||'Error','error');
}

    ${modalHeader('Editar búsqueda')}
    <form id="editBusquedaForm" onsubmit="submitEditBusqueda(event,'${id}')" class="space-y-3">
      ${['cliente','puesto','seniority','modalidad','jd_link'].map(f=>`
        <div><label class="block text-xs font-medium text-gray-600 mb-1">${f.replace(/_/g,' ')}</label><input name="${f}" value="${b[f]||''}" class="${inputCls()}"></div>`).join('')}
      <div><label class="block text-xs font-medium text-gray-600 mb-1">Recruiter(s)</label>
        <div class="flex flex-wrap gap-3 mt-1">${(App.data.recruiters||[]).map(r=>{
          const asignados=(b.recruiter_asignado||'').split(',').map(x=>x.trim());
          const checked=asignados.includes(r.nombre)?'checked':'';
          return `<label class="flex items-center gap-1.5 text-sm cursor-pointer"><input type="checkbox" name="recruiter_asignado" value="${r.nombre}" ${checked} class="rounded border-gray-300 text-indigo-600"> ${r.nombre}</label>`;
        }).join('')}</div>
      </div>
      <div><label class="block text-xs font-medium text-gray-600 mb-1">Estado</label>
        <select name="estado" class="${selectCls()}">${['activa','pausada','cerrada','perdida'].map(s=>`<option ${b.estado===s?'selected':''}>${s}</option>`).join('')}</select></div>
      <div><label class="block text-xs font-medium text-gray-600 mb-1">Prioridad</label>
        <select name="prioridad" class="${selectCls()}">${['alta','media','baja'].map(s=>`<option ${b.prioridad===s?'selected':''}>${s}</option>`).join('')}</select></div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="block text-xs font-medium text-gray-600 mb-1">Fee tipo</label>
          <select name="fee_tipo" class="${selectCls()}"><option value="%" ${b.fee_tipo==='%'?'selected':''}>%</option><option value="fijo" ${b.fee_tipo==='fijo'?'selected':''}>Fijo</option></select></div>
        <div><label class="block text-xs font-medium text-gray-600 mb-1">Fee valor</label><input name="fee_valor" type="number" value="${b.fee_valor||''}" class="${inputCls()}"></div>
        <div><label class="block text-xs font-medium text-gray-600 mb-1">Fee base</label><input name="fee_base" type="number" value="${b.fee_base||''}" class="${inputCls()}"></div>
        <div><label class="block text-xs font-medium text-gray-600 mb-1">Fee período</label>
          <select name="fee_periodo" class="${selectCls()}"><option value="mensual" ${b.fee_periodo==='mensual'?'selected':''}>Mensual</option><option value="anual" ${b.fee_periodo==='anual'?'selected':''}>Anual</option></select></div>
        <div><label class="block text-xs font-medium text-gray-600 mb-1">Moneda</label>
          <select name="moneda" class="${selectCls()}"><option value="ARS" ${b.moneda==='ARS'?'selected':''}>ARS</option><option value="USD" ${b.moneda==='USD'?'selected':''}>USD</option></select></div>
        <div><label class="block text-xs font-medium text-gray-600 mb-1">Fecha cierre</label><input name="fecha_cierre" type="date" value="${b.fecha_cierre||''}" class="${inputCls()}"></div>
        <div><label class="block text-xs font-medium text-gray-600 mb-1">Vacantes a cubrir</label><input name="vacantes" type="number" min="1" value="${b.vacantes||1}" class="${inputCls()}"></div>
      </div>
      <div><label class="block text-xs font-medium text-gray-600 mb-2">🔒 Tipo de búsqueda</label>
        <div class="grid grid-cols-2 gap-2">
          <label class="flex items-center gap-2 border rounded-lg px-3 py-2.5 cursor-pointer hover:bg-gray-50 has-[:checked]:border-gray-900 has-[:checked]:bg-gray-50">
            <input type="radio" name="exclusividad" value="exclusiva" ${(b.exclusividad||'exclusiva')==='exclusiva'?'checked':''} class="text-gray-900">
            <div><p class="text-xs font-semibold text-gray-800">Exclusiva</p><p class="text-xs text-gray-400">Solo nosotros</p></div>
          </label>
          <label class="flex items-center gap-2 border rounded-lg px-3 py-2.5 cursor-pointer hover:bg-gray-50 has-[:checked]:border-gray-900 has-[:checked]:bg-gray-50">
            <input type="radio" name="exclusividad" value="compartida" ${b.exclusividad==='compartida'?'checked':''} class="text-gray-900">
            <div><p class="text-xs font-semibold text-gray-800">Compartida</p><p class="text-xs text-gray-400">Con otras agencias</p></div>
          </label>
        </div></div>
      <button type="submit" class="w-full bg-gray-900 text-white py-3 rounded-xl font-semibold hover:bg-gray-700 transition text-sm mt-2">Guardar cambios</button>
    </form>
  </div>`;
}
async function submitEditBusqueda(e,id) {
  e.preventDefault();
  const fd=new FormData(e.target);
  const d=Object.fromEntries(fd.entries());
  d.recruiter_asignado=fd.getAll('recruiter_asignado').join(', ');
  const r=await apiPost({action:'editar_busqueda',data:{id,...d}});
  if(r.status==='ok'){showToast('Búsqueda actualizada ✓');closeModal();await loadSection('busquedas');}
  else showToast(r.message||'Error','error');
}

// ═══════════════════════════════════════════════════════════════
// LEAD FORM (landing)
// ═══════════════════════════════════════════════════════════════
async function submitLead(e) {
  e.preventDefault();
  const btn=document.getElementById('leadSubmitBtn');
  btn.disabled=true; btn.textContent='Enviando...';
  try {
    const fd=new FormData(e.target);
    const r=await apiPostPublic({action:'nuevo_lead',data:Object.fromEntries(fd.entries())});
    if(r.status==='ok'){e.target.reset();showToast('¡Recibimos tu consulta! Te contactamos pronto.');}
    else showToast(r.message||'Error al enviar','error');
  } catch(err){showToast('Error de conexión','error');}
  btn.disabled=false; btn.textContent='Enviar consulta';
}

// ═══════════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════════
function attachEvents() {}

render();
</script>
